 tip:"▸ Bu metnin ritmi koşu gibi olmalı. Başta sakin, ortada hızlanır, sonda güçlü biter."},

// Gün 58
{baslik:"Kütüphanenin Sırrı",kategori:"Tarih · Bilgi",
 body:`<p>İskenderiye Kütüphanesi, antik dünyanın en büyük bilgi merkeziydi. Yaklaşık beş yüz bin papirüs tomarı barındırıyordu. Dönemin neredeyse tüm yazılı bilgisi orada toplanmıştı. Matematik, tıp, felsefe, şiir, coğrafya. Dünyanın dört bir yanından gemilerle taşınmış kitaplar. Ve sonra yandı. Tam olarak ne zaman, nasıl yandığı hala tartışmalıdır. Ama o yangın, insanlığın belki de en büyük entelektüel kaybıdır.</p><p>Bir kütüphane sadece kitap deposu değildir. Bir kütüphane, zamanla yarışan tek yapıdır. İçindeki kitaplar, yüzyıllar önceki insanların düşüncelerini bugüne taşır. Bir raf, farklı çağlardan yazarları bir araya getirir. Sokrates ile bugünün fizikçisi, yan yana durur. Zaman, kütüphanede kaybolur.</p><p>Bugün dünyada yaklaşık iki yüz milyon kitap yayımlanmış. Bir insan ömrü boyunca bunların kaçını okuyabilir? En hızlı okuyucular bile en fazla beş altı bin kitap. Bu oran yüzde birin çok altındadır. Bu, bir tevazu dersidir. Her insan, var olan bilginin küçücük bir parçasına ulaşabilir. Ve bu, merakı asla bitirmemek için yeterli bir nedendir.</p><p>Bir kütüphane görevlisi şöyle anlatmış: İnsanlar kitap ararken kaybolur. Ama bu kaybolma iyidir. Aradıklarını bulamazlar çoğu zaman. Ama aramadıklarını bulurlar. Ve bu tesadüf buluşları, bazen hayatlarını değiştirir. Kütüphanede gezinmek, bilinmeyene açılan bir kapıdır.</p><p>Birincisi, bilgi birikmesi insanlığın en büyük projesidir. İkincisi, her okunan kitap, o birikime yapılan küçük bir katkıdır. Üçüncüsü, bilgiye ulaşmak bir ayrıcalıktır ve bu ayrıcalık, sorumluluk getirir. Bu üç gerçek, okumayı sıradan bir eylemden çıkarır.</p><p>Sesli okuma da bu birikimin bir parçasıdır. Okuduğunuz her metin, birinin emeğidir. Onu sesle canlandırmak, o emeğe verilen en güzel yanıttır. Ve sesiniz, o bilgiyi başkalarına aktarmanın aracıdır.</p><p>Bugün sesli okurken, elinizde tuttuğu metnin arkasındaki emeği düşünün. Yazılan her kelime, düşünülmüş bir kelimedir. Ona saygı gösterin. Dikkatle okuyun. Çünkü bu metin, küçük de olsa, o devasa birikimin bir parçasıdır.</p>`,
 vurgu:[{s:"1",t:"Beş yüz bin papirüs tomarı cümlesini yavaş okuyun. Arından ve sonra yandı derken sesiniz düşsün."},
        {s:"2",t:"Birincisi, ikincisi, üçüncüsü yapısını saygılı ve ciddi bir tonda okuyun. Bu bir sorumluluk bildirisidir."}],
 tip:"▸ Kütüphane ve bilgi metinlerinde ses derin olmalı. Bu metnin ruhu ağırdır, hafif okunmamalı."},

// Gün 59
{baslik:"Hayvanların Dili",kategori:"Bilim · Doğa",
 body:`<p>İnsanlar dil kullanır. Bunu biliyoruz. Ama hayvanlar ne kullanır? Uzun yıllar boyunca bilim insanları, hayvan iletişimini basit içgüdüsel tepkiler olarak gördü. Ama son on yıllardaki araştırmalar, bu bakışı kökten değiştirdi. Hayvanlar, sandığımızdan çok daha karmaşık şeyler söylüyor.</p><p>Balinaların şarkıları, yüzlerce kilometre mesafeye ulaşır. Bu şarkılar her yıl değişir. Yeni melodiler eklenir, eskiler düşer. Ve bu değişim, bir balinadan diğerine yayılır. Kültürel aktarım. Yani balinalar, kültür sahibidir. Bir balina, öğrendiği bir melodi ile başka bir balinayı etkiler. Bu, öğrenmedir. Bu, iletişimdir.</p><p>Fil sürüleri, ölmüş bir fil ile karşılaştıklarında ona uzun süre dokunur. Hortumlarıyla kemiklerini okşar. Uzun süre başından ayrılmaz. Buna yas diyorlar araştırmacılar. Yas tutan hayvanlar, kaybı hissediyor demektir. Hissetmek, duyguya sahip olmak demektir. Ve bu, yalnızca insanlara ait bir özellik değildir.</p><p>Maymunlar işaret dili öğrenebilir. Bir gorilla, Koko adında, iki binden fazla işaret dili kelimesi öğrendi. Ve bu kelimelerle yeni kavramlar ifade etti. Kedisini kaybettiğinde, üzüntüsünü işaret diliyle anlattı. Bu iletişimdi. Ve bu iletişim, dil sınırlarını zorladı.</p><p>Birincisi, hayvan iletişimi sandığımızdan çok daha karmaşıktır. İkincisi, duygu ve yas insanlara özgü değildir. Üçüncüsü, dil ile iletişim arasındaki sınır, giderek bulanıklaşmaktadır. Bu üç bulgu, insanlığın kendine bakışını değiştirmektedir.</p><p>İnsan sesi, tüm bu iletişim biçimleri arasında en karmaşık olandır. Binlerce yıl içinde gelişen bir sistem. Dil, ton, ritim, anlam. Bunların hepsini bir arada taşıyan tek iletişim biçimi, insan sesidir. Bu mirası hafife almayın.</p><p>Bugün sesli okurken, sesinizin ne kadar karmaşık ve güçlü bir araç olduğunu hatırlayın. Bir balina şarkı söyler. Bir fil yas tutar. Bir maymun işaret eder. Ve siz, bütün bunların ötesinde bir şeyle konuşursunuz: anlam üretirsiniz. Bu fark, sesinizi çok daha değerli kılar.</p>`,
 vurgu:[{s:"1",t:"Koko adında bir gorilla bölümünü yavaş ve dikkatli okuyun. Her kelime bir mucizedir."},
        {s:"2",t:"Birincisi, ikincisi, üçüncüsü yapısını bilim insanı ciddiyetiyle okuyun."}],
 tip:"▸ Doğa metinlerinde ses açık ve meraklı olmalı. Her canlıya duyulan bir saygı var bu metinde."},

// Gün 60
{baslik:"Altmış Günün Ruhu",kategori:"İnsan · Yolculuk",
 body:`<p>Altmış gün önce bir başlangıç vardı. Belki temkinli bir adım. Belki meraklı bir açılış. Belki zorunluluk hissiyle yapılan bir deneme. Ama bir başlangıç vardı. Ve o başlangıç, bugün burada, altmışıncı günde meyve veriyor.</p><p>Altmış gün, iki ay demektir. İki ay boyunca her gün bir şeye zaman ayırmak, o şeyi hayatınızın bir parçası yapmak demektir. Rutinler iki ay içinde yerleşir. Alışkanlıklar iki ay içinde kök salar. Siz bu kökü salladınız. Ve köklü olan, rüzgarda sallanır ama yıkılmaz.</p><p>Bir şey fark ettiniz mi? Sesiniz eskisinden daha uzun süre yorulmadan çalışıyor. Kelimeler ağzınızda daha hızlı şekilleniyor. Uzun cümleleri nefes kesilmeden bitirebiliyorsunuz. Belki bunların hepsini fark etmediniz. Ama fark etmek için geriye bakmak gerekir. Ve şimdi, altmışıncı gün, geriye bakmak için iyi bir andır.</p><p>Bir dağcı zirveye ulaştığında, ilk yaptığı şey geriye bakmaktır. Geldiği yolu görmek için. O yol, zahmetle çıkılmış bir yoldur. Ama yukarıdan bakınca güzel görünür. Çünkü her adım, şimdi durduğunuz yerin bir parçasıdır. Sevinmeyi hak ediyorsunuz.</p><p>Birincisi, altmış günlük tutarlılık, bir karakterin göstergesidir. İkincisi, sesin gelişimi sessiz ama gerçektir. Üçüncüsü, devam etmek, başlamaktan daha önemlidir. Çünkü herkes başlayabilir, ama devam edenler fark yaratır.</p><p>Bu yolculuk bitmedi. Daha çok gün var. Daha çok metin var. Daha çok ses var. Ama bugün, altmışıncı günde, bir an durun. Nefes alın. Ve kendinize şunu söyleyin: Devam ettim. Bu küçük bir şey değildir. Çoğu insan bu noktaya kadar gelemez. Siz geldiniz.</p><p>Sesiniz büyüyor. Fark etseniz de etmeseniz de. Her gün biraz daha. Her okumada biraz daha. Bu büyüme sessizdir, ama gerçektir. Ve gerçek olan şeyler, bir gün görünür hale gelir. O gün geldiğinde, bugünü hatırlayacaksınız. Altmışıncı gün. Devam ettiğiniz gün.</p>`,
 vurgu:[{s:"1",t:"Altmış gün önce bir başlangıç vardı cümlesini sakin ve derin okuyun. Bu bir geriye bakıştır."},
        {s:"2",t:"Birincisi, ikincisi, üçüncüsü yapısında her cümle sevinçten değil, sükûnetten beslensin."}],
 tip:"▸ Bu metin bir kutlamadır. Ama sessiz bir kutlama. Gürültülü değil, içten okuyun."},

// Gün 61
{baslik:"Sıfırdan Başlamak",kategori:"İnsan · Cesaret",
 body:`<p>Her şeyi bırakmak. Bildiklerinizi, alıştıklarınızı, güvende hissettiren her şeyi. Ve sıfırdan başlamak. Bu fikir, çoğu insanı dondurur. Çünkü sıfır, boşluktur. Ve boşluk, kaygı doğurur. Ama bazı insanlar bu boşluğa atlar. Ve o atlayış, hayatlarını değiştirir.</p><p>Julia Child, kırk yaşında yemek öğrenmeye başladı. Daha önce hiç profesyonel mutfak eğitimi almamıştı. Paris'te şef okuluna gitti. Sınıftaki en yaşlı öğrenciydi. Birçok şeyi en son anlayan da oydu. Ama vazgeçmedi. Ve bugün, dünya mutfak tarihinin en tanınan isimlerinden biridir. Sıfır başlangıcı, sonsuz bir mirasa dönüştü.</p><p>Vera Wang, yirmi sekiz yaşında buz patencisi olmaktan vazgeçti. Moda tasarımına geçti. Sektörde deneyimi yoktu. Ama bir şeylerin nasıl olmaması gerektiğini biliyordu. Ve bu olumsuz bilgi, zaman zaman pozitif bilgiden daha değerlidir. Bugün dünya modasının en önemli isimlerinden biridir.</p><p>Sıfırdan başlamak bir kayıp gibi görünür. Ama aslında bir kazanımdır. Birincisi, ön yargılardan arınmış bir zihinle girilir. İkincisi, her şey yeni olduğundan her şey öğretilebilirdir. Üçüncüsü, sahte uzmanlığın verdiği körlük yoktur. Başlangıç zihniyeti, en verimli öğrenme halidir.</p><p>Sesinizi geliştirmeye başladığınızda da bu böyleydi. Belki yıllarca konuşmuştunuz ama sesi hiç bu şekilde düşünmemiştiniz. Bu uygulamayla birlikte, kendi sesinize yeniden başlangıç zihniyetiyle baktınız. Ve bu bakış, sizi daha hızlı ilerletti.</p><p>Hayatınızda sıfırdan başlamayı düşündüğünüz bir alan var mı? O alana bu zihniyetle bakın. Yaşınız, geçmişiniz, eksikleriniz değil. Sadece bugün ve ilk adım. Çünkü Julia Child kırk yaşında bir mutfağa girdi. Ve dünyayı değiştirdi.</p><p>Bugün sesli okuyarak, her gün biraz daha sıfırın ötesine geçiyorsunuz. Bu yolculuk devam ediyor. Ve bu yolculukta en önemli şey hız değil, yön. Doğru yönde yavaş ilerlemek, yanlış yönde hızlı koşmaktan iyidir.</p>`,
 vurgu:[{s:"1",t:"Julia Child ve Vera Wang bölümlerini farklı bir merakla, keşfeder gibi okuyun."},
        {s:"2",t:"Birincisi, ikincisi, üçüncüsü yapısında her öğeyi bir argüman gibi güçlü ve net söyleyin."}],
 tip:"▸ Bu metin cesaret ve umut taşır. Ses buna uygun olmalı: ne aşırı coşkulu ne de düz. Sıcak ve güçlü."},

{baslik:"Kelimelerin Tarihi",kategori:"Dil · Tarih",
 body:`<p>Kullandığınız her kelimenin bir tarihi vardır. Masa kelimesi nereye gider? Arapça maide kelimesine. Kitap kelimesi? Yine Arapçaya. Kalem? Oradan. Pencere? Farsça pençere'ye. Türkçe, yüzyıllar boyunca pek çok dilden beslenmiş, zenginleşmiş, dönüşmüştür. Bu dönüşüm bir zayıflık değil, canlılığın kanıtıdır.</p><p>Kelimelerin nasıl öldüğünü biliyor musunuz? Kullanılmayarak ölürler. Bir nesil konuşmaya başladığında bazı kelimeleri almaz. Bir sonraki nesil onları hiç duymaz. Ve bir gün, o kelime sadece sözlüklerde yaşar. Canlı bir varlık olan dil, kullanımla yaşar. Kullanılmadığında kurur.</p><p>Ama kelimeler bazen dirilir de. Türkçede arı Türkçe kelimeler bulmak için yapılan çalışmalar, unutulan sözcükleri yeniden gün yüzüne çıkardı. Uçak, televizyon, sinema, bilgisayar. Bunların hepsinin Türkçe karşılıkları bulundu ya da üretildi. Bir dili sevmek, onun için kelime aramak demektir.</p><p>Yabancı bir kelimenin girmesiyle dil bozulmaz. Her dilin içinde başka dillerin izleri vardır. İngilizce, Latince ve Fransızcadan yüklüdür. Japonca, Çince köklere yaslanmıştır. Diller etkileşir. Bu etkileşim, zenginliktir. Ama kendi köküne tutunmak, bu zenginliği taşıyabilmek için gereklidir.</p><p>Birincisi, her kelime bir tarihin taşıyıcısıdır. İkincisi, dil kullanımla yaşar, ihmal ile ölür. Üçüncüsü, dilin zenginliği, köküne sadık kalarak başka dillerden beslenebilmesindedir. Bu üç gerçek, dili sevmenin üç biçimidir.</p><p>Sesli okuma, dilinizi yeniden keşfetmenin en güzel yoludur. Her metinde karşılaştığınız kelimeler, kökleriyle birlikte değerlenir. Bir kelimeyi güzel söylemek, ona saygı göstermektir. Ve saygı gösterilen her şey, yaşar.</p><p>Bugün okurken, bir kelimeyi seçin. Anlamını bilin. Kökenini araştırın. Onu hakkıyla telaffuz edin. O kelimeye sahip çıkın. Çünkü sahip çıkılan kelimeler, dilden ölmez.</p>`,
 vurgu:[{s:"1",t:"Masa, kitap, kalem, pencere kelimelerini tek tek söyleyin. Her biri ayrı bir gezi gibi."},
        {s:"2",t:"Birincisi, ikincisi, üçüncüsü yapısını bir dil sevdalısının ağzından söyler gibi, içten okuyun."}],
 tip:"▸ Bu metinde Türkçe kelimeler özellikle özenle telaffuz edilmeli. Her kelime, dilin bir taşıdır."},

{baslik:"Sesin Armağanı",kategori:"İnsan · Ses",
 body:`<p>Altmış üç gün. Bu yolculuğun sonuna geldiniz. Ya da belki bir sonrakinin başına. Çünkü gerçek gelişme, bir son noktası olmayan süreçtir. Bir kitabın son sayfasını çevirmek nasıl hem bitiş hem de başlangıçsa, bu da böyledir. Burada durup geri bakabilirsiniz. Ve sonra devam edebilirsiniz.</p><p>Sesiniz bir armağandır. Ama armağanlar, açılmayı bekler. Bazı insanlar sesiniz güzel değil der ve o armağanı bir köşeye bırakır. Bazıları sesiniz neden bu kadar önemli ki der ve onu fark etmez. Ama siz bu altmış üç gün boyunca o armağanı her gün açtınız. Her gün biraz daha içine baktınız. Her gün biraz daha keşfettiniz.</p><p>Ses, en kişisel şeydir. Parmak izi gibi, hiçbir ses bir diğeriyle aynı değildir. Dünyanın her yerinde milyarlarca insan var. Ve hepsinin sesi, birbirinden farklı. Bu fark, bir kusur değil, bir mucizedir. Sizin sesiniz, tam olarak sizindir. Başka kimsenin değil.</p><p>Bu yolculukta öğrendiklerinizi bir düşünün. Birincisi, nefes kontrolü. İkincisi, artikülasyon. Üçüncüsü, tonlama ve ritim. Dördüncüsü, belki en önemlisi: sesinize sahip çıkmak. Bu dördü birlikte, bir konuşmacının temelini oluşturur. Ve bu temel, artık sizin içinizde.</p><p>Eski bir Türk ustası şöyle demiş: Bir zanaatı öğrenmek üç aşamalıdır. Birinci aşama: kuralları öğrenmek. İkinci aşama: kuralları içselleştirmek. Üçüncü aşama: kuralları aşmak. İlk aşamada sesiniz kural içindedir. İkinci aşamada ses, kuralı taşır. Üçüncü aşamada ses, kuralı aşar ve özgür olur. Bu yolculuk, o üçüncü aşamaya doğru gidiyor.</p><p>Sesinizi duyduğunuzda artık ne hissediyorsunuz? İlk günkü o yabancılık var mı hala? Yoksa sesiniz size biraz daha tanıdık mı geldi? Bu tanışma, bu sahiplenme, bu yolculuğun en değerli kazanımıdır.</p><p>Bugün son metni okuyorsunuz. Ama son kelime, ilk kelimenin tohumunu içinde taşır. Ve o tohum, bir dahaki açılışı bekliyor. Ne zaman açarsanız açın, ses orada olacak. Sizinle. Güçlü, bilinçli ve hazır.</p><p>Sesiniz bir armağandır. Onu açtınız. Şimdi dünyaya verin.</p>`,
 vurgu:[{s:"1",t:"Birincisi, ikincisi, üçüncüsü, dördüncüsü yapısında her öğeyi ayrı bir hediye verir gibi, içten ve yavaş okuyun."},
        {s:"2",t:"Son cümleyi, Sesiniz bir armağandır. Onu açtınız. Şimdi dünyaya verin. Her birini ayrı duraksayarak, güçlü ve sakin söyleyin."}],
 tip:"▸ Bu son metin, tüm yolculuğun özetidir. Her kelimeye hakkını verin. Acele yok. Başından sonuna kadar tam bir dikkatle okuyun."},

let state = {started:false, currentDay:0, completedDays:[], streak:0};
let tekState = {};

// ── Nefes zamanlayıcısı ──
let breathInterval = null;
let breathSt = {phase:0, count:4, set:1};
const BREATH_PHASES = ['Nefes Al','Tut','Ver'];
const BREATH_COLORS = ['#2e9e5e','#c8a84b','#5b8fc9'];

function toggleBreath(){
  if(breathInterval){ stopBreath(); } else { startBreath(); }
}
function startBreath(){
  breathSt = {phase:0, count:4, set:1};
  const disp = document.getElementById('breathDisplay');
  const btn  = document.getElementById('breathBtn');
  if(!disp || !btn) return;
  disp.style.display = 'flex';
  btn.textContent = '■ Durdur';
  updateBreathDisplay();
  breathInterval = setInterval(breathTick, 1000);
}
function stopBreath(){
  clearInterval(breathInterval);
  breathInterval = null;
  const disp = document.getElementById('breathDisplay');
  const btn  = document.getElementById('breathBtn');
  if(disp) disp.style.display = 'none';
  if(btn){ btn.textContent = '▶ Zamanlayıcıyı Başlat'; btn.disabled = false; }
}
function breathTick(){
  breathSt.count--;
  if(breathSt.count <= 0){
    breathSt.phase++;
    if(breathSt.phase > 2){
      breathSt.phase = 0;
      breathSt.set++;
      if(breathSt.set > 3){
        clearInterval(breathInterval);
        breathInterval = null;
        const btn = document.getElementById('breathBtn');
        const disp = document.getElementById('breathDisplay');
        if(disp) disp.style.display = 'none';
        if(btn){ btn.textContent = '✓ 3 Set Tamamlandı'; btn.disabled = true; }
        return;
      }
    }
    breathSt.count = 4;
  }
  updateBreathDisplay();
}
function updateBreathDisplay(){
  const ph = document.getElementById('breathPhase');
  const cn = document.getElementById('breathCount');
  const st = document.getElementById('breathSet');
  if(!ph) return;
  ph.textContent = BREATH_PHASES[breathSt.phase];
  cn.textContent = breathSt.count;
  cn.style.color  = BREATH_COLORS[breathSt.phase];
  st.textContent  = 'Set ' + breathSt.set + ' / 3';
}

function toggleTekDot(key, dotIdx){
  const cur = tekState[key] || 0;
  tekState[key] = dotIdx < cur ? dotIdx : dotIdx + 1;
  const cont = document.getElementById('tdots-' + key);
  const row  = document.getElementById('trow-' + key);
  if(!cont || !row) return;
  cont.querySelectorAll('.tur-dot').forEach(function(d, i){
    d.classList.toggle('active', i < tekState[key]);
  });
  row.classList.toggle('tur-done', tekState[key] >= 5);
}

function loadState(){
  const s = localStorage.getItem("diksipro_v3");
  if(s) state = JSON.parse(s);
}
function saveState(){
  localStorage.setItem("diksipro_v3", JSON.stringify(state));
}
function startProgram(){
  state = {started:true, currentDay:0, completedDays:[], streak:0};
  saveState();
  showMain();
}
function showMain(){
  document.getElementById("scSetup").style.display = "none";
  document.getElementById("scMain").style.display = "block";
  renderDay(state.currentDay);
}
function maxUnlocked(){
  if(state.completedDays.length === 0) return 0;
  const lastCompleted = Math.max(...state.completedDays);
  return Math.min(62, lastCompleted + 1);
}
function navigate(dir){
  const mu = maxUnlocked();
  const next = state.currentDay + dir;
  if(next < 0 || next > mu) return;
  state.currentDay = next;
  renderDay(next);
}
function markDone(){
  const cd = state.currentDay;
  const mu = maxUnlocked();
  if(cd !== mu) return;
  if(!state.completedDays.includes(cd)){
    state.completedDays.push(cd);
    if(!state.completedAt) state.completedAt = {};
    state.completedAt[cd] = new Date().toISOString();
    const sorted = [...state.completedDays].sort((a,b)=>a-b);
    let s = 0;
    for(let i = sorted.length-1; i >= 0; i--){
      if(i === sorted.length-1 || sorted[i] === sorted[i+1]-1) s++;
      else break;
    }
    state.streak = s;
    saveState();
  }
  renderDay(cd);
}

function renderDay(idx){
  if(breathInterval){ clearInterval(breathInterval); breathInterval = null; }
  tekState = {};
  const mu = maxUnlocked();
  const isDone = state.completedDays.includes(idx);
  const isActive = idx === mu && !isDone;
  const isLocked = idx > mu;

  const weekIdx = Math.floor(idx/7);
  const dayInWeek = idx%7;
  const set = SETS[weekIdx];
  const setWeek = (weekIdx%3)+1;
  const teks = TEKERLEMELER[set][dayInWeek];
  const metin = METINLER[idx];
  const siir = SIIRLER[idx] || SIIRLER[SIIRLER.length-1];

  // Header
  document.getElementById("setLbl").textContent = "Set " + set + " · " + setWeek + ". Hafta";
  document.getElementById("streakN").textContent = state.streak;
  document.getElementById("streakBadge").className = "streak" + (state.streak > 0 ? " hot" : "");

  // Week dots
  const dotsEl = document.getElementById("wdots");
  dotsEl.innerHTML = "";
  const ws = Math.floor(mu/7)*7;
  for(let d = ws; d < ws+7 && d <= 62; d++){
    const wd = document.createElement("div");
    const dDone = state.completedDays.includes(d);
    const dActive = d === mu && !dDone;
    wd.className = "wd" + (dDone?" done":"") + (dActive?" now":"");
    dotsEl.appendChild(wd);
  }

  // Nav
  document.getElementById("navDay").textContent = "Gün " + (idx+1);
  document.getElementById("navSub").textContent =
    isActive ? "Bugünün egzersizi" :
    isDone ? "Tamamlandı" :
    isLocked ? "Kilitli" : "Geçmiş gün";
  document.getElementById("btnPrev").disabled = idx === 0;
  document.getElementById("btnNext").disabled = idx >= mu;

  // Done button
  const btn = document.getElementById("doneBtn");
  if(isLocked){ btn.className="done-btn locked"; btn.textContent="🔒 Önceki günü tamamla"; }
  else if(isDone){ btn.className="done-btn completed"; btn.textContent="✓ Tamamlandı"; }
  else if(isActive){ btn.className="done-btn active"; btn.textContent="✓ Bugünü Tamamladım"; }
  else{ btn.className="done-btn past"; btn.textContent="Geçmiş gün"; }

  // Content
  const c = document.getElementById("content");
  c.innerHTML = "";

  if(isDone) c.innerHTML += '<div class="done-banner">✓ Bu günü tamamladın 🎉</div>';

  // 1. DİYAFRAM NEFESİ
  c.innerHTML += '<div class="nefes-card">' +
    '<div class="blabel">Diyafram Nefesi</div>' +
    '<div class="nefes-title">4 · 4 · 4 Nefes Tekniği</div>' +
    '<div class="nefes-sub">Sesin gücü akciğerden değil, diyaframdan gelir. Bu egzersiz diyaframı aktive eder, sesi derinleştirir ve konuşma ortasında nefes tükenmesini önler. 3 set yapılır — her set aşağıdaki 3 adımdan oluşur.</div>' +
    '<div class="nefes-steps">' +
    '<div class="nefes-step"><div class="nsn">1</div><div>Bir elini göbeğinin üstüne koy. <strong>4 sayarak burundan nefes al</strong> — yalnızca karın şişsin, göğüs hareketsiz kalsın. Göğüs şişiyorsa yanlış yapıyorsun.</div></div>' +
    '<div class="nefes-step"><div class="nsn">2</div><div><strong>4 sayarak nefesini tut.</strong> Karın şişkin halde sabit dursun. Omuzlar düşük, çene serbest.</div></div>' +
    '<div class="nefes-step"><div class="nsn">3</div><div><strong>4 sayarak ağızdan yavaşça ver.</strong> Karın içeri çekilsin. Ses çıkarmadan, kontrollü, düzgün bir akışla bitir. → Kısa nefes al, tekrar başa dön.</div></div>' +
    '</div>' +
    '<div class="nefes-note">3 seti bitirince: cümle ortasında nefes tükenmez, ses titreşmez, hız arttıkça kalite düşmez.</div>' +
    '<div class="breath-timer">' +
      '<button class="breath-btn" id="breathBtn" onclick="toggleBreath()">▶ Zamanlayıcıyı Başlat</button>' +
      '<div class="breath-display" id="breathDisplay" style="display:none">' +
        '<div class="breath-phase" id="breathPhase">Nefes Al</div>' +
        '<div class="breath-count" id="breathCount">4</div>' +
        '<div class="breath-set" id="breathSet">Set 1 / 3</div>' +
      '</div>' +
    '</div>' +
    '</div>';

  // 2. REZONANS
  c.innerHTML += '<div class="rezo-card">' +
    '<div class="blabel">Rezonans Egzersizi</div>' +
    '<div class="rezo-hum">M · N · NG</div>' +
    '<div class="rezo-sub">Sesi göğse çeker, kalınlaştırır, otoriteli tını yaratır. Tüm sesleri sırayla bitirince 1 set tamamlanır — kısa nefes alınır, başa dönülür. Sesler arası bekleme yok, direkt geçilir. Toplamda 3 set.</div>' +
    '<div class="tur-box" style="margin-bottom:12px">' +
    '<div class="tur-title">Her Set — Bu Sırayla</div>' +
    '<div class="tur-rows">' +
    '<div class="tur-row"><div class="tur-num">M</div><div class="tur-desc"><strong>Mmmm — 5 saniye</strong> → direkt geçiş ↓</div></div>' +
    '<div class="tur-row"><div class="tur-num">N</div><div class="tur-desc"><strong>Nnnnn — 5 saniye</strong> → direkt geçiş ↓</div></div>' +
    '<div class="tur-row"><div class="tur-num">NG</div><div class="tur-desc"><strong>Ngngng — 5 saniye</strong> → direkt geçiş ↓</div></div>' +
    '<div class="tur-row"><div class="tur-num">+</div><div class="tur-desc"><strong>Mmm-maa · mee · mii · moo · muu</strong> → direkt geçiş ↓</div></div>' +
    '<div class="tur-row"><div class="tur-num">✓</div><div class="tur-desc"><strong>Ha-ha-ha × 5</strong> → 1 set bitti, 3-5 sn nefes, tekrar başa</div></div>' +
    '</div></div>' +
    '<div class="sec-title">M Sesi — Ağız Pozisyonu</div>' +
    '<div class="rezo-steps"><div class="rezo-step"><div class="nsn">▸</div><div>Dudaklar rahatça kapalı, zorlamadan. Dişler birbirinden ayrık, ağız içi boş. Dil serbest. <strong>İşaret parmağını dudağına daya — titreşim hissedilmeli.</strong> Hissedilmiyorsa sesi öne yönlendir.</div></div></div>' +
    '<div class="sec-title">N Sesi — Ağız Pozisyonu</div>' +
    '<div class="rezo-steps"><div class="rezo-step"><div class="nsn">▸</div><div>Dudaklar açık, dil ucunu üst dişlerin hemen arkasına daya. Dil gergin değil, sadece değiyor. <strong>Parmağını burnunun üstüne koy — M sesinden farklı bir noktadan titreşim hissedilmeli.</strong></div></div></div>' +
    '<div class="sec-title">NG Sesi — Ağız Pozisyonu</div>' +
    '<div class="rezo-steps"><div class="rezo-step"><div class="nsn">▸</div><div>Ağız orta açık. Dil ucu serbest. Dil kökü yumuşak damağa değiyor — K ve G sesindeki gibi. "King" kelimesinin sonu. <strong>Elini kafanın arkasına koy — titreşim oradan gelmeli.</strong> En zor olan bu, sabırlı ol.</div></div></div>' +
    '<div class="sec-title">Mmm-maa Geçişi</div>' +
    '<div class="rezo-steps"><div class="rezo-step"><div class="nsn">▸</div><div>Dudaklar kapalıyken Mmm çıkar, yavaşça aç ve "aaa"ya geç. <strong>Ses kesilmemeli</strong> — titreşim dudaktan ağzın içine akmalı. Her geçişte çene aşağı düşsün.</div></div></div>' +
    '<div class="sec-title">Ha-ha-ha</div>' +
    '<div class="rezo-steps"><div class="rezo-step"><div class="nsn">▸</div><div>Ağız açık. Her Ha sesinde <strong>karın içeri çekilmeli</strong> — göğüs değil, karın çalışıyor. Hızlı ve güçlü: Ha-ha-ha-ha-ha.</div></div></div>' +
    '<div class="rezo-note">Titreşimi hiç hissedemiyorsan: sesi öne yönlendir, boğazdan değil önden geldiğini hayal et. Her sabah 3 set yapılırsa 2 haftada ses tonu belirgin değişir.</div>' +
    '</div>';

  // 3. ISINMA
  c.innerHTML += '<div class="warm-card">' +
    '<div class="blabel">Artikülasyon Isınması</div>' +
    '<div class="warm-vowels">A · E · I · O · U</div>' +
    '<div class="tur-box">' +
    '<div class="tur-title">3 Tur — A E I O U Kesintisiz</div>' +
    '<div class="tur-rows">' +
    '<div class="tur-row"><div class="tur-num">1</div><div class="tur-desc"><strong>Yavaş ve abartarak:</strong> Her ünlüde çene maksimum açılsın, dudaklar abartılı şekil alsın. → 1 nefes ↓</div></div>' +
    '<div class="tur-row"><div class="tur-num">2</div><div class="tur-desc"><strong>Normal hızda:</strong> Akıcı ve temiz. Her ünlü net çıksın, biri diğerine karışmasın. → 1 nefes ↓</div></div>' +
    '<div class="tur-row"><div class="tur-num">3</div><div class="tur-desc"><strong>Hızlı:</strong> Maksimum hız ama netlik düşmesin, buruna kaçma. Bitti.</div></div>' +
    '</div></div>' +
    '<div class="warm-note">Sesler arası direkt geçiş — bekleme yok. Burun sesi fark edersen ağzı daha da aç, sesi önden çıkar.</div>' +
    '</div>';

  // 4. TEKERLEMELER
  c.innerHTML += '<div class="ses-grp">' + SES_GRUPLARI[dayInWeek] + '</div>';
  const turLabels = [
    ['5× Yavaş', 'Her heceyi abartarak söyle — kasları hisset, hız değil netlik önemli'],
    ['5× Normal', 'Doğal konuşma hızı — ses akıcı ve temiz çıksın'],
    ['5× Hızlı',  'Maksimum hız — ama hiçbir ses yutulmasın']
  ];
  teks.forEach(function(t, i){
    let turRowsHtml = '';
    turLabels.forEach(function(lbl, j){
      const key = idx + '-' + i + '-' + j;
      let dots = '';
      for(let d = 0; d < 5; d++){
        dots += '<div class="tur-dot" onclick="toggleTekDot(\'' + key + '\',' + d + ')"></div>';
      }
      turRowsHtml +=
        '<div class="tur-row" id="trow-' + key + '">' +
        '<div class="tur-num">' + (j+1) + '</div>' +
        '<div class="tur-desc"><strong>' + lbl[0] + ':</strong> ' + lbl[1] +
        '<div class="tur-counter" id="tdots-' + key + '">' + dots + '</div></div>' +
        '</div>';
    });
    c.innerHTML += '<div class="tek">' +
      '<div class="tek-no">Tekerleme ' + (i+1) + '</div>' +
      '<div class="tek-text">' + t.m + '</div>' +
      '<div class="tek-note">' + t.n + '</div>' +
      '<div class="tur-box">' +
      '<div class="tur-title">15 Tekrar — 3 Tur &nbsp;·&nbsp; Dokunarak işaretle</div>' +
      '<div class="tur-rows">' + turRowsHtml + '</div></div></div>';
  });

  c.innerHTML += '<div class="divider"></div>';

  // 5. OKUMA METNİ
  let vurguHtml = "";
  if(metin.vurgu && metin.vurgu.length > 0){
    vurguHtml = '<div class="read-vurgu"><div class="read-vurgu-title">Vurgu Pratiği</div><div class="read-vurgu-rows">' +
      metin.vurgu.map(function(v){ return '<div class="read-vurgu-row"><span>' + v.s + '.</span>' + v.t + '</div>'; }).join("") +
      '</div></div>';
  }
  c.innerHTML += '<div class="read-card">' +
    '<div class="blabel">Sesli Okuma Metni</div>' +
    '<div class="read-title">' + metin.baslik + '</div>' +
    '<div class="read-cat">' + metin.kategori + '</div>' +
    '<div class="read-body">' + metin.body + '</div>' +
    vurguHtml +
    '<div class="read-tip">' + metin.tip + '</div>' +
    '</div>';

  // 6. TUĞ + ANA EKRANA EKLE
  c.innerHTML += '<div class="tug">' +
    '<div class="tug-name">♡ Tuğ için</div>' +
    '<div class="tug-poem">' + siir.s.replace(/\n/g, '<br>') + '</div>' +
    '</div>' +
    '<div class="install-wrap"><button class="install-btn" onclick="installPrompt()">⊕ Ana Ekrana Ekle</button></div>';
}

// Ana ekrana ekle
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault();
  deferredPrompt = e;
});
function installPrompt(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(){ deferredPrompt = null; });
  } else {
    alert("Ana ekrana eklemek için:\n\nAndroid: Tarayıcı menüsü → 'Ana ekrana ekle'\niPhone: Paylaş → 'Ana Ekrana Ekle'");
  }
}

loadState();
if(state.started) showMain();
</script>
</body>
</html>
