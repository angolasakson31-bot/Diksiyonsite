<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080b10">
<title>DiksiPro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b10;--s1:#0f1520;--s2:#16202e;--s3:#1e2d40;--gold:#c8a84b;--text:#dce6f0;--sub:#8fa3b8;--muted:#4a5d72;--border:#1e2d40;--green:#2e9e5e;--r:14px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100dvh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}

/* SETUP */
#scSetup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:40px 20px;text-align:center}
.brand-name{font-family:'Playfair Display',serif;font-size:56px;font-weight:700;letter-spacing:-2px;line-height:1}
.brand-name em{color:var(--gold);font-style:normal}
.brand-sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:8px;margin-bottom:52px}
.setup-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:30px 22px;width:100%;max-width:380px}
.setup-card h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px}
.setup-card p{font-size:13px;color:var(--sub);line-height:1.65;margin-bottom:26px}
.pills{display:flex;gap:8px;margin-bottom:28px}
.pill{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 6px;text-align:center}
.pill strong{display:block;font-size:22px;font-weight:700;color:var(--gold)}
.pill span{font-size:10px;color:var(--muted);margin-top:2px;display:block}
.btn-gold{width:100%;padding:16px;background:var(--gold);color:#000;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-gold:active{opacity:.8}
.tug-setup{margin-top:22px;font-size:11px;color:var(--muted);letter-spacing:1px}
.tug-setup em{font-style:normal;color:var(--gold);font-family:'Playfair Display',serif;font-size:14px;font-weight:700}

/* MAIN */
#scMain{display:none}
.hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:14px 18px 12px;position:sticky;top:0;z-index:100}
.hdr-r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hdr-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.hdr-logo em{color:var(--gold);font-style:normal}
.streak{display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:700;transition:all .3s}
.streak.hot{border-color:var(--gold);color:var(--gold)}
.hdr-r2{display:flex;align-items:center;justify-content:space-between}
.set-lbl{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.wdots{display:flex;gap:5px;align-items:center}
.wd{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .3s}
.wd.done{background:var(--green)}
.wd.now{background:var(--gold);width:10px;height:10px}

.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--s2);border-bottom:1px solid var(--border)}
.nav-btn{background:none;border:1px solid var(--border);color:var(--sub);border-radius:9px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.nav-btn:disabled{opacity:.2;cursor:default}
.nav-btn:not(:disabled):active{background:var(--s3)}
.nav-mid{text-align:center}
.nav-day{font-size:15px;font-weight:700}
.nav-sub{font-size:11px;color:var(--muted);margin-top:1px}

.content{padding:16px 14px 120px;max-width:500px;margin:0 auto}
.blabel{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.blabel::after{content:'';flex:1;height:1px;background:var(--border)}

/* NEFES */
.nefes-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px}
.nefes-title{font-size:15px;font-weight:700;margin-bottom:6px}
.nefes-sub{font-size:12px;color:var(--sub);line-height:1.6;margin-bottom:12px}
.nefes-steps{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.nefes-step{display:flex;align-items:flex-start;gap:9px;font-size:12px;line-height:1.6}
.nsn{min-width:22px;height:22px;border-radius:50%;background:var(--s3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--gold);flex-shrink:0;margin-top:1px}
.nefes-step div{color:var(--sub)}
.nefes-step strong{color:var(--text)}
.nefes-note{font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:9px;line-height:1.55}

/* REZONANS */
.rezo-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px}
.rezo-hum{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--gold);letter-spacing:8px;margin-bottom:6px}
.rezo-sub{font-size:12px;color:var(--sub);line-height:1.6;margin-bottom:12px}
.rezo-steps{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.rezo-step{display:flex;align-items:flex-start;gap:9px;font-size:12px;line-height:1.6}
.rezo-step div{color:var(--sub)}
.rezo-step strong{color:var(--text)}
.rezo-note{font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:9px;line-height:1.55}
.sec-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:14px 0 8px}

/* ISINMA */
.warm-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
.warm-vowels{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;letter-spacing:10px;color:var(--gold);margin-bottom:10px}
.warm-note{font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:9px;margin-top:10px;line-height:1.5}

/* SES GRUBU */
.ses-grp{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.ses-grp::after{content:'';flex:1;height:1px;background:var(--border)}

/* TEKERLEME */
.tek{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:8px;position:relative;overflow:hidden}
.tek::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);opacity:.4;border-radius:3px 0 0 3px}
.tek-no{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.tek-text{font-size:16px;line-height:1.8;color:var(--text);font-weight:500;margin-bottom:12px}
.tek-note{font-size:12px;color:var(--sub);border-top:1px solid var(--border);padding-top:10px;line-height:1.6;margin-bottom:10px}

/* TUR BOX */
.tur-box{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.tur-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.tur-rows{display:flex;flex-direction:column;gap:6px}
.tur-row{display:flex;align-items:flex-start;gap:9px;font-size:12px;line-height:1.5}
.tur-num{min-width:20px;height:20px;border-radius:50%;background:var(--s3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--gold);flex-shrink:0;margin-top:1px}
.tur-desc{color:var(--sub)}
.tur-desc strong{color:var(--text);font-weight:600}

.divider{height:1px;background:var(--border);margin:22px 0}

/* OKUMA */
.read-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px 18px}
.read-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1.3;margin-bottom:4px}
.read-cat{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.read-body{font-size:15px;line-height:1.92;color:#b0c2d4}
.read-body p{margin-bottom:15px}
.read-body p:last-child{margin-bottom:0}
.read-vurgu{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-top:14px}
.read-vurgu-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.read-vurgu-rows{display:flex;flex-direction:column;gap:5px}
.read-vurgu-row{font-size:12px;color:var(--sub);line-height:1.5;display:flex;align-items:flex-start;gap:7px}
.read-vurgu-row span{color:var(--gold);font-weight:700;flex-shrink:0}
.read-tip{font-size:12px;color:var(--sub);border-top:1px solid var(--border);padding-top:12px;margin-top:12px;line-height:1.6}

/* TUĞ */
.tug{text-align:center;padding:24px 14px 6px}
.tug-name{font-family:'Playfair Display',serif;font-size:13px;color:var(--gold);letter-spacing:1px;margin-bottom:8px}
.tug-poem{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:var(--sub);line-height:1.8}

/* ANA EKRANA */
.install-wrap{text-align:center;padding:10px 0 4px}
.install-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .2s}
.install-btn:active{background:var(--s2);color:var(--sub)}

/* DONE */
.done-banner{background:rgba(46,158,94,.1);border:1px solid rgba(46,158,94,.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--green);font-weight:600;text-align:center}
.done-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 14px 24px;background:linear-gradient(transparent,var(--bg) 38%)}
.done-btn{display:block;width:100%;max-width:500px;margin:0 auto;padding:16px;border-radius:13px;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.done-btn.active{background:var(--gold);color:#000}
.done-btn.completed{background:var(--green);color:#fff}
.done-btn.locked,.done-btn.past{background:var(--s2);color:var(--muted);border:1px solid var(--border);cursor:default}
</style>
</head>
<body>

<div id="scSetup">
  <div class="brand-name">Diksi<em>Pro</em></div>
  <div class="brand-sub">Profesyonel Ses Eğitimi</div>
  <div class="setup-card">
    <h2>Hoş Geldin</h2>
    <p>9 haftalık profesyonel diksiyon programı. Her gün yaklaşık 10 dakika. Kendi hızında ilerle.</p>
    <div class="pills">
      <div class="pill"><strong>9</strong><span>Hafta</span></div>
      <div class="pill"><strong>63</strong><span>Gün</span></div>
      <div class="pill"><strong>~10dk</strong><span>Günlük</span></div>
    </div>
    <button class="btn-gold" onclick="startProgram()">Programa Başla →</button>
  </div>
  <div class="tug-setup">♡ <em>Tuğ</em> için</div>
</div>

<div id="scMain">
  <div class="hdr">
    <div class="hdr-r1">
      <div class="hdr-logo">Diksi<em>Pro</em></div>
      <div class="streak" id="streakBadge">🔥 <span id="streakN">0</span> gün</div>
    </div>
    <div class="hdr-r2">
      <div class="set-lbl" id="setLbl">Set A · 1. Hafta</div>
      <div class="wdots" id="wdots"></div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">← Önceki</button>
    <div class="nav-mid">
      <div class="nav-day" id="navDay">Gün 1</div>
      <div class="nav-sub" id="navSub">Bugünün egzersizi</div>
    </div>
    <button class="nav-btn" id="btnNext" onclick="navigate(1)">Sonraki →</button>
  </div>
  <div class="content" id="content"></div>
  <div class="done-bar">
    <button class="done-btn active" id="doneBtn" onclick="markDone()">✓ Bugünü Tamamladım</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// VERİ
// ═══════════════════════════════════════

const SETS = ["A","A","A","B","B","B","C","C","C"];
const SES_GRUPLARI = [
  "P · B · M — Dudak Kasları",

  "K · G · Ğ — Dil Kökü",

// TEKERLEMELER
const TEKERLEMELER = {
  A: [
    // Gün 1 — P·B·M
    [{m:"Bir berber bir berbere gel beraber bir berber dükkanı açalım demiş, berber de berbere neden açalım ki demiş.",n:"Her B'de dudaklar tam kapansın. İlk 2 turda yavaş ve net, 3. turda hızlan ama B sesi yutulmasın."},

    [{m:"Deden dededen, dede de dededen, dedenin dedesi de dededen gelmiş, dededen dede.",n:"D'yi dil ucuyla diş arkasına vur. Keskin ve kısa. Her D bir tokmak gibi — yumuşatma, netleştir."},

     {m:"Köpek köpeğin köpeğine havladı, köpeğin köpeği de havladı, ikisi de birbirine havladı.",n:"Ğ'yi yutma — hafifçe uzat, bir ses gibi muamele et. K-G-Ğ üçlüsü dil kökünde çalışıyor."},

    // Gün 4 — S·Z·Ş·J

  {baslik:"Edison'un 10.000 Deneyi",kategori:"Tarih · Kararlılık",
   body:`<p>Thomas Edison, ampulü icat etmeden önce binlerce kez başarısız oldu. Bir gazeteci bunu yüzüne vurduğunda Edison şöyle yanıt verdi: "Başarısız olmadım. İşe yaramayan binlerce yöntemi keşfettim." Bu cümleyi ilk okuduğunda belki sıradan gelir. Ama üzerinde durduğunda her şeyin değiştiğini fark edersin.</p>
<p>Başarısızlık bir son değildir. Bir bilgidir. Her hata sana neyin işe yaramadığını gösterir. Ve neyin işe yaramadığını bilen biri, doğru yola her geçen gün biraz daha yaklaşır. Bu yüzden Edison'un laboratuvarında hiçbir zaman yas tutulmadı. Aksine, her başarısız deney bir kutlama sebebiydi — çünkü bir olasılık daha elenmiş, yol biraz daha daralmıştı.</p>
<p>Edison'un çalışma biçimi de dikkat çekiciydi. Sabah erkenden gelir, gece geç saatlere kadar çalışırdı. Yardımcıları onun neredeyse hiç uyumadığını söylerdi. Ama Edison'a göre uyku bir kayıp değil, bir araçtı. Gerektiği kadar uyur, gerektiği kadar çalışırdı. Ne fazla, ne eksik.</p>
<p>Peki başarısızlıktan bu kadar yorulmaz mıydı? Yorulurdu. Ama her yorgunluktan sonra şunu hatırlardı: Bir şeyin işe yaramadığını öğrenmek, o şeyi hiç denememiş olmaktan çok daha değerlidir. Bu düşünce onu ayakta tuttu. On bin kez değil, belki daha fazla.</p>
<p>Edison laboratuvarında çalışırken yanında her zaman asistanlar bulunurdu. Onlara da aynı şeyi öğretirdi: Sonucu değil, süreci sev. Bir deney başarısız olduğunda asistanlar üzülürdü. Edison ise "Hâlâ öğreniyoruz" derdi. Kısa, net, kesin. Açıklamaya gerek yoktu.</p>
<p>Yıllar sonra bir gazeteci ona sordu: "Bu kadar başarısızlıktan sonra nasıl devam edebildiniz?" Edison masasına yaslandı, düşündü. Sonra şöyle dedi: "Çünkü hiçbirini başarısızlık olarak görmedim. Her birini bir adım olarak gördüm. Ve adımlar birikirken, yol kendiliğinden ortaya çıktı."</p>
<p>Edison sadece ampulü değil, bir düşünce biçimini de icat etti. Sonuç odaklı değil, süreç odaklı düşünmek. Hedefe değil, öğrenmeye odaklanmak. Bu yüzden binlerce kez düşen adam, tarihin en büyük mucitlerinden biri olarak ayağa kalktı.</p>
<p>Peki ya sen? Kaçıncı denemede bırakıyorsun?</p>`,

  {baslik:"Sessizliğin Gücü",kategori:"İletişim · Tonlama",
   body:`<p>Konuşmacılar arasında en güçlü araç kelimeler değildir. Sessizliktir. Bir cümle söyledin, sustun — ve o suskunluk dinleyiciye düşündürür, hissettirir, merak ettirir. Bu yüzden büyük konuşmacılar cümlelerini bitirdikten sonra hemen devam etmezler. Bir an beklerler. Ve o bir an, söylediklerinin içine işler.</p>
<p>Bunu fark etmek yeterli değil. Uygulamak gerekir. Çünkü çoğu insan sessizlikten korkar. Boşluğu doldurmak için konuşur, doldurmak için hızlanır. Bu hız bazen güvensizliği ele verir. Sanki söylediklerin önemli değilmiş gibi, bir an bile beklemeye değmezmiş gibi görünür.</p>
<p>Oysa tam tersi doğrudur. Sustuktan sonra konuşan insan daha güçlü görünür. Çünkü o sessizlik şunu söyler: Söylediklerimin içine işlemesi için sana zaman veriyorum. Bu, konuşmacının en güçlü jestlerinden biridir.</p>
<p>Spikerlerin ve tiyatro oyuncularının yıllarca üzerinde çalıştığı şey budur. Nerede dur. Ne kadar dur. Nasıl dur. Sessizlik bir hata değil, bir tekniktir. Ve bu teknik, kelimelerden çok daha fazla şey anlatır.</p>
<p>Peki sessizlik nasıl öğrenilir? Pratikle. Cümle biter, nefes alırsın. O nefes bir zayıflık değil, bir tercihdir. Devam etmeye hazırım ama seçiyorum — bir an bekliyorum. Bu his dinleyiciye de geçer. Ve o an, konuşmanın en güçlü anı olur.</p>
<p>Bir diğer gerçek: Sessizlik yalnızca konuşmada değil, dinlemede de işe yarar. İki insan konuşurken biri susan, diğeri kendini değerli hisseder. Çünkü suskunluk şunu söyler: Seni duyuyorum. Devam et. Acele etme.</p>
<p>Bu metni okurken noktalarda gerçekten dur. Sadece nefes almak için değil — o anı hissetmek için. Her nokta bir seçimdir. Her virgül bir nefestir.</p>

  // Gün 3
  {baslik:"Tesla'nın Zihin Laboratuvarı",kategori:"Bilim · Ritim",
   body:`<p>Nikola Tesla, 1899 yılında Colorado'daki laboratuvarında oturmuş düşünüyordu. Elinde kâğıt yoktu. Kalem de yoktu. Ama zihninde dünyanın en karmaşık elektrik sistemini çiziyordu — tam olarak, hatasız, çalışır halde. Deney yapmadan önce tüm hesapları kafasında tamamlardı. Ve çoğu zaman sonuç, hesapladığıyla birebir aynı çıkardı.</p>
<p>Tesla'nın bu özelliği efsaneleşmişti. Çevresindekiler ona inanmakta güçlük çekiyordu. Nasıl mümkündü? Bir makineyi kafanın içinde çalıştırmak, hataları önceden görmek, sonucu tahmin etmek. Edison bile bunu ciddiye almıyordu başlarda. Ama Tesla her seferinde haklı çıktı.</p>
<p>Peki bu yetenek nereden geliyordu? Tesla'ya göre cevap basitti: Düşünmek için zaman ayırmak. Herkes bir şeyi hemen denemeye, hemen uygulamaya, hemen sonuç almaya çalışırdı. Tesla ise önce düşünürdü. Uzun süre, derinlemesine, kesintisiz.</p>
<p>Tesla yalnız çalışırdı. Laboratuvarına gelen ziyaretçileri nadiren içeri alırdı. Derin düşünme, sessiz ve kesintisiz bir ortam ister. Bir fikir tam oturmadan bölünürse, yeniden oturması saatler alabilir.</p>
<p>Bugün tam tersini yapıyoruz. Her şeyi hemen dışarıya yazıyoruz. Telefona, ekrana, kâğıda. Düşünmeden not alıyoruz, sindirmeden kaydediyoruz. Belki de bu yüzden bir şeyleri gerçekten anlayamıyoruz — sadece saklıyoruz.</p>

// ═══════════════════════════════════════
// UYGULAMA MANTIĞI
// ═══════════════════════════════════════

let state = {started:false, currentDay:0, completedDays:[], streak:0};

function loadState(){
  const s = localStorage.getItem("diksipro_v3");
  if(s) state = JSON.parse(s);
}
function saveState(){
  localStorage.setItem("diksipro_v3", JSON.stringify(state));
}
function startProgram(){
  state = {started:true, currentDay:0, completedDays:[], streak:0};
  saveState();
  showMain();
}
function showMain(){
  document.getElementById("scSetup").style.display = "none";
  document.getElementById("scMain").style.display = "block";
  renderDay(state.currentDay);
}
function maxUnlocked(){
  if(state.completedDays.length === 0) return 0;
  const lastCompleted = Math.max(...state.completedDays);
  const lastCompletedAt = state.completedAt ? state.completedAt[lastCompleted] : null;
  if(lastCompletedAt){
    const now = new Date();
    const completedDate = new Date(lastCompletedAt);
    const nextMidnight = new Date(completedDate.getFullYear(), completedDate.getMonth(), completedDate.getDate()+1, 0, 0, 0);
    if(now < nextMidnight) return lastCompleted;
  }
  return Math.min(62, lastCompleted + 1);
}
function navigate(dir){
  const mu = maxUnlocked();
  const next = state.currentDay + dir;
  if(next < 0 || next > mu) return;
  state.currentDay = next;
  renderDay(next);
}
function markDone(){
  const cd = state.currentDay;
  const mu = maxUnlocked();
  if(cd !== mu) return;
  if(!state.completedDays.includes(cd)){
    state.completedDays.push(cd);
    if(!state.completedAt) state.completedAt = {};
    state.completedAt[cd] = new Date().toISOString();
    const sorted = [...state.completedDays].sort((a,b)=>a-b);
    let s = 0;
    for(let i = sorted.length-1; i >= 0; i--){
      if(i === sorted.length-1 || sorted[i] === sorted[i+1]-1) s++;
      else break;
    }
    state.streak = s;
    saveState();
  }
  renderDay(cd);
}

function renderDay(idx){
  const mu = maxUnlocked();
  const isDone = state.completedDays.includes(idx);
  const isActive = idx === mu && !isDone;
  const isLocked = idx > mu;

  const weekIdx = Math.floor(idx/7);
  const dayInWeek = idx%7;
  const set = SETS[weekIdx];
  const setWeek = (weekIdx%3)+1;
  const teks = TEKERLEMELER[set][dayInWeek];
  const metin = METINLER[idx];
  const siir = SIIRLER[idx] || SIIRLER[SIIRLER.length-1];

  // Header
  document.getElementById("setLbl").textContent = "Set " + set + " · " + setWeek + ". Hafta";
  document.getElementById("streakN").textContent = state.streak;
  document.getElementById("streakBadge").className = "streak" + (state.streak > 0 ? " hot" : "");

  // Week dots
  const dotsEl = document.getElementById("wdots");
  dotsEl.innerHTML = "";
  const ws = Math.floor(mu/7)*7;
  for(let d = ws; d < ws+7 && d <= 62; d++){
    const wd = document.createElement("div");
    const dDone = state.completedDays.includes(d);
    const dActive = d === mu && !dDone;
    wd.className = "wd" + (dDone?" done":"") + (dActive?" now":"");
    dotsEl.appendChild(wd);
  }

  // Nav
  document.getElementById("navDay").textContent = "Gün " + (idx+1);
  document.getElementById("navSub").textContent =
    isActive ? "Bugünün egzersizi" :
    isDone ? "Tamamlandı" :
    isLocked ? "Kilitli" : "Geçmiş gün";
  document.getElementById("btnPrev").disabled = idx === 0;
  document.getElementById("btnNext").disabled = idx >= mu;

  // Done button
  const btn = document.getElementById("doneBtn");
  if(isLocked){ btn.className="done-btn locked"; btn.textContent="🔒 Önceki günü tamamla"; }
  else if(isDone){ btn.className="done-btn completed"; btn.textContent="✓ Tamamlandı"; }
  else if(isActive){ btn.className="done-btn active"; btn.textContent="✓ Bugünü Tamamladım"; }
  else{ btn.className="done-btn past"; btn.textContent="Geçmiş gün"; }

  // Content
  const c = document.getElementById("content");
  c.innerHTML = "";

  if(isDone) c.innerHTML += '<div class="done-banner">✓ Bu günü tamamladın 🎉</div>';

  // 1. DİYAFRAM NEFESİ
  c.innerHTML += '<div class="nefes-card">' +
    '<div class="blabel">Diyafram Nefesi</div>' +
    '<div class="nefes-title">4 · 4 · 4 Nefes Tekniği</div>' +
    '<div class="nefes-sub">Sesin gücü akciğerden değil, diyaframdan gelir. Bu egzersiz diyaframı aktive eder, sesi derinleştirir ve konuşma ortasında nefes tükenmesini önler. 3 set yapılır — her set aşağıdaki 3 adımdan oluşur.</div>' +
    '<div class="nefes-steps">' +
    '<div class="nefes-step"><div class="nsn">1</div><div>Bir elini göbeğinin üstüne koy. <strong>4 sayarak burundan nefes al</strong> — yalnızca karın şişsin, göğüs hareketsiz kalsın. Göğüs şişiyorsa yanlış yapıyorsun.</div></div>' +
    '<div class="nefes-step"><div class="nsn">2</div><div><strong>4 sayarak nefesini tut.</strong> Karın şişkin halde sabit dursun. Omuzlar düşük, çene serbest.</div></div>' +
    '<div class="nefes-step"><div class="nsn">3</div><div><strong>4 sayarak ağızdan yavaşça ver.</strong> Karın içeri çekilsin. Ses çıkarmadan, kontrollü, düzgün bir akışla bitir. → Kısa nefes al, tekrar başa dön.</div></div>' +
    '</div>' +
    '<div class="nefes-note">3 seti bitirince: cümle ortasında nefes tükenmez, ses titreşmez, hız arttıkça kalite düşmez.</div>' +
    '</div>';

  // 2. REZONANS
  c.innerHTML += '<div class="rezo-card">' +
    '<div class="blabel">Rezonans Egzersizi</div>' +
    '<div class="rezo-hum">M · N · NG</div>' +
    '<div class="rezo-sub">Sesi göğse çeker, kalınlaştırır, otoriteli tını yaratır. Tüm sesleri sırayla bitirince 1 set tamamlanır — kısa nefes alınır, başa dönülür. Sesler arası bekleme yok, direkt geçilir. Toplamda 3 set.</div>' +
    '<div class="tur-box" style="margin-bottom:12px">' +
    '<div class="tur-title">Her Set — Bu Sırayla</div>' +
    '<div class="tur-rows">' +
    '<div class="tur-row"><div class="tur-num">M</div><div class="tur-desc"><strong>Mmmm — 5 saniye</strong> → direkt geçiş ↓</div></div>' +
    '<div class="tur-row"><div class="tur-num">N</div><div class="tur-desc"><strong>Nnnnn — 5 saniye</strong> → direkt geçiş ↓</div></div>' +
    '<div class="tur-row"><div class="tur-num">NG</div><div class="tur-desc"><strong>Ngngng — 5 saniye</strong> → direkt geçiş ↓</div></div>' +
    '<div class="tur-row"><div class="tur-num">+</div><div class="tur-desc"><strong>Mmm-maa · mee · mii · moo · muu</strong> → direkt geçiş ↓</div></div>' +
    '<div class="tur-row"><div class="tur-num">✓</div><div class="tur-desc"><strong>Ha-ha-ha × 5</strong> → 1 set bitti, 3-5 sn nefes, tekrar başa</div></div>' +
    '</div></div>' +
    '<div class="sec-title">M Sesi — Ağız Pozisyonu</div>' +
    '<div class="rezo-steps"><div class="rezo-step"><div class="nsn">▸</div><div>Dudaklar rahatça kapalı, zorlamadan. Dişler birbirinden ayrık, ağız içi boş. Dil serbest. <strong>İşaret parmağını dudağına daya — titreşim hissedilmeli.</strong> Hissedilmiyorsa sesi öne yönlendir.</div></div></div>' +
    '<div class="sec-title">N Sesi — Ağız Pozisyonu</div>' +
    '<div class="rezo-steps"><div class="rezo-step"><div class="nsn">▸</div><div>Dudaklar açık, dil ucunu üst dişlerin hemen arkasına daya. Dil gergin değil, sadece değiyor. <strong>Parmağını burnunun üstüne koy — M sesinden farklı bir noktadan titreşim hissedilmeli.</strong></div></div></div>' +
    '<div class="sec-title">NG Sesi — Ağız Pozisyonu</div>' +
    '<div class="rezo-steps"><div class="rezo-step"><div class="nsn">▸</div><div>Ağız orta açık. Dil ucu serbest. Dil kökü yumuşak damağa değiyor — K ve G sesindeki gibi. "King" kelimesinin sonu. <strong>Elini kafanın arkasına koy — titreşim oradan gelmeli.</strong> En zor olan bu, sabırlı ol.</div></div></div>' +
    '<div class="sec-title">Mmm-maa Geçişi</div>' +
    '<div class="rezo-steps"><div class="rezo-step"><div class="nsn">▸</div><div>Dudaklar kapalıyken Mmm çıkar, yavaşça aç ve "aaa"ya geç. <strong>Ses kesilmemeli</strong> — titreşim dudaktan ağzın içine akmalı. Her geçişte çene aşağı düşsün.</div></div></div>' +
    '<div class="sec-title">Ha-ha-ha</div>' +
    '<div class="rezo-steps"><div class="rezo-step"><div class="nsn">▸</div><div>Ağız açık. Her Ha sesinde <strong>karın içeri çekilmeli</strong> — göğüs değil, karın çalışıyor. Hızlı ve güçlü: Ha-ha-ha-ha-ha.</div></div></div>' +
    '<div class="rezo-note">Titreşimi hiç hissedemiyorsan: sesi öne yönlendir, boğazdan değil önden geldiğini hayal et. Her sabah 3 set yapılırsa 2 haftada ses tonu belirgin değişir.</div>' +
    '</div>';

  // 3. ISINMA
  c.innerHTML += '<div class="warm-card">' +
    '<div class="blabel">Artikülasyon Isınması</div>' +
    '<div class="warm-vowels">A · E · I · O · U</div>' +
    '<div class="tur-box">' +
    '<div class="tur-title">3 Tur — A E I O U Kesintisiz</div>' +
    '<div class="tur-rows">' +
    '<div class="tur-row"><div class="tur-num">1</div><div class="tur-desc"><strong>Yavaş ve abartarak:</strong> Her ünlüde çene maksimum açılsın, dudaklar abartılı şekil alsın. → 1 nefes ↓</div></div>' +
    '<div class="tur-row"><div class="tur-num">2</div><div class="tur-desc"><strong>Normal hızda:</strong> Akıcı ve temiz. Her ünlü net çıksın, biri diğerine karışmasın. → 1 nefes ↓</div></div>' +
    '<div class="tur-row"><div class="tur-num">3</div><div class="tur-desc"><strong>Hızlı:</strong> Maksimum hız ama netlik düşmesin, buruna kaçma. Bitti.</div></div>' +
    '</div></div>' +
    '<div class="warm-note">Sesler arası direkt geçiş — bekleme yok. Burun sesi fark edersen ağzı daha da aç, sesi önden çıkar.</div>' +
    '</div>';

  // 4. TEKERLEMELER
  c.innerHTML += '<div class="ses-grp">' + SES_GRUPLARI[dayInWeek] + '</div>';
  teks.forEach(function(t, i){
    c.innerHTML += '<div class="tek">' +
      '<div class="tek-no">Tekerleme ' + (i+1) + '</div>' +
      '<div class="tek-text">' + t.m + '</div>' +
      '<div class="tek-note">' + t.n + '</div>' +
      '<div class="tur-box">' +
      '<div class="tur-title">15 Tekrar — 3 Tur</div>' +
      '<div class="tur-rows">' +
      '<div class="tur-row"><div class="tur-num">1</div><div class="tur-desc"><strong>5× Yavaş:</strong> Her heceyi abartarak söyle — kasları hisset, hız değil netlik önemli</div></div>' +
      '<div class="tur-row"><div class="tur-num">2</div><div class="tur-desc"><strong>5× Normal:</strong> Doğal konuşma hızı — ses akıcı ve temiz çıksın</div></div>' +
      '<div class="tur-row"><div class="tur-num">3</div><div class="tur-desc"><strong>5× Hızlı:</strong> Maksimum hız — ama hiçbir ses yutulmasın</div></div>' +
      '</div></div></div>';
  });

  c.innerHTML += '<div class="divider"></div>';

  // 5. OKUMA METNİ
  let vurguHtml = "";
  if(metin.vurgu && metin.vurgu.length > 0){
    vurguHtml = '<div class="read-vurgu"><div class="read-vurgu-title">Vurgu Pratiği</div><div class="read-vurgu-rows">' +
      metin.vurgu.map(function(v){ return '<div class="read-vurgu-row"><span>' + v.s + '.</span>' + v.t + '</div>'; }).join("") +
      '</div></div>';
  }
  c.innerHTML += '<div class="read-card">' +
    '<div class="blabel">Sesli Okuma Metni</div>' +
    '<div class="read-title">' + metin.baslik + '</div>' +
    '<div class="read-cat">' + metin.kategori + '</div>' +
    '<div class="read-body">' + metin.body + '</div>' +
    vurguHtml +
    '<div class="read-tip">' + metin.tip + '</div>' +
    '</div>';

  // 6. TUĞ + ANA EKRANA EKLE
  c.innerHTML += '<div class="tug">' +
    '<div class="tug-name">♡ Tuğ için</div>' +
    '<div class="tug-poem">' + siir.s.replace(/\n/g, '<br>') + '</div>' +
    '</div>' +
    '<div class="install-wrap"><button class="install-btn" onclick="installPrompt()">⊕ Ana Ekrana Ekle</button></div>';
}

// Ana ekrana ekle
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault();
  deferredPrompt = e;
});
function installPrompt(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(){ deferredPrompt = null; });
  } else {
    alert("Ana ekrana eklemek için:\n\nAndroid: Tarayıcı menüsü → 'Ana ekrana ekle'\niPhone: Paylaş → 'Ana Ekrana Ekle'");
  }
}

loadState();
if(state.started) showMain();
</script>
</body>
</html>
