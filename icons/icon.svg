<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="72%">
      <stop offset="0%" stop-color="#2A1A0A"/>
      <stop offset="100%" stop-color="#110804"/>
    </radialGradient>
  </defs>

  <!-- Background: dark warm chocolate -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- D Monogram — 3 concentric outline rings (center of arcs at 256,256) -->
  <!-- Outer D: R=175, bar x=81, top/bottom y=81,431 -->
  <line x1="81" y1="81"  x2="81" y2="431" stroke="#D07820" stroke-width="20" stroke-linecap="round"/>
  <path d="M 81,81 A 175,175 0 0 1 81,431"
        fill="none" stroke="#D07820" stroke-width="20" stroke-linecap="round"/>

  <!-- Middle D: R=145, bar x=111, top/bottom y=111,401 -->
  <line x1="111" y1="111" x2="111" y2="401" stroke="#D07820" stroke-width="20" stroke-linecap="round"/>
  <path d="M 111,111 A 145,145 0 0 1 111,401"
        fill="none" stroke="#D07820" stroke-width="20" stroke-linecap="round"/>

  <!-- Inner D: R=115, bar x=141, top/bottom y=141,371 -->
  <line x1="141" y1="141" x2="141" y2="371" stroke="#D07820" stroke-width="20" stroke-linecap="round"/>
  <path d="M 141,141 A 115,115 0 0 1 141,371"
        fill="none" stroke="#D07820" stroke-width="20" stroke-linecap="round"/>

  <!-- Sound wave — flows through D hollow then out right -->
  <path d="M 58,258 C 105,168 178,348 242,258 C 295,178 358,338 418,258 C 444,228 460,238 488,226"
        fill="none" stroke="#D07820" stroke-width="20" stroke-linecap="round"/>
</svg>
