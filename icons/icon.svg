<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#111E35"/>
      <stop offset="100%" stop-color="#060A14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!--
    Logo concept: "Phoneme D"
    A bold letter D formed by a solid vertical bar + three concentric
    right-facing semicircular arcs at decreasing opacity — the arcs
    represent sound/voice radiating outward in layers (depth).
    A white pill in the hollow represents the voice / phoneme itself.
    All arcs are centered at the bar's right edge (x=200, y=256).
  -->

  <!-- Outer arc — faintest layer, gives spatial depth -->
  <path d="M 200,100 A 156,156 0 0 1 200,412"
        fill="none" stroke="#CAAA50" stroke-width="10"
        stroke-opacity="0.18" stroke-linecap="round"/>

  <!-- Middle arc — mid depth -->
  <path d="M 200,134 A 122,122 0 0 1 200,378"
        fill="none" stroke="#CAAA50" stroke-width="22"
        stroke-opacity="0.50" stroke-linecap="round"/>

  <!-- Inner arc — primary form, full brightness -->
  <path d="M 200,170 A 86,86 0 0 1 200,342"
        fill="none" stroke="#CAAA50" stroke-width="38"
        stroke-opacity="1.0" stroke-linecap="round"/>

  <!-- Vertical bar — the spine of the D -->
  <rect x="144" y="100" width="52" height="312" rx="14" fill="#CAAA50"/>

  <!-- Voice pill — white capsule in the hollow of the D -->
  <!-- Hollow spans x=200 to x=267 (inner arc inner edge at y=256). Centered at x=233. -->
  <rect x="208" y="238" width="52" height="36" rx="18"
        fill="white" opacity="0.88"/>
</svg>
