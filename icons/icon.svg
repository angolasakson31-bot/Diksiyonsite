<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111828"/>
      <stop offset="100%" stop-color="#080B16"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <g clip-path="url(#clip)">
    <!-- D-wave: vertical bar + concentric right-facing arcs forming letter D -->

    <!-- Outer arc — faintest halo -->
    <path d="M 164,68 A 188,188 0 0 1 164,444"
          fill="none" stroke="#CFAB52" stroke-width="16" stroke-opacity="0.18" stroke-linecap="round"/>

    <!-- Middle-outer arc -->
    <path d="M 164,112 A 144,144 0 0 1 164,400"
          fill="none" stroke="#CFAB52" stroke-width="24" stroke-opacity="0.42" stroke-linecap="round"/>

    <!-- Middle-inner arc -->
    <path d="M 164,158 A 98,98 0 0 1 164,354"
          fill="none" stroke="#CFAB52" stroke-width="32" stroke-opacity="0.70" stroke-linecap="round"/>

    <!-- Inner arc — full brightness -->
    <path d="M 164,206 A 50,50 0 0 1 164,306"
          fill="none" stroke="#CFAB52" stroke-width="40" stroke-opacity="1" stroke-linecap="round"/>

    <!-- Vertical bar of the D -->
    <rect x="100" y="96" width="60" height="320" rx="30" fill="#CFAB52"/>

    <!-- Junction highlight — small bright oval where bar meets arcs -->
    <ellipse cx="164" cy="256" rx="7" ry="10" fill="#FFE8A8" opacity="0.85"/>
  </g>
</svg>
