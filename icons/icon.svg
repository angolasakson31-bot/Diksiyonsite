<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="45%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#2B1D0E"/>
      <stop offset="100%" stop-color="#120A04"/>
    </radialGradient>
  </defs>

  <!-- Background: dark warm chocolate, iOS/Android rounded -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!--
    Logo: "D" multiline letterform + sound wave
    Three concentric D-shaped strokes sharing arc-center (256,256).
    A flowing sound-wave bezier weaves through the D hollow.
    All strokes: #CC7820 (warm amber), 20px wide, round caps/joins.
  -->

  <!-- ── Outer D  (R=170, bar x=86, span y=86→426) ── -->
  <line x1="86" y1="86"  x2="86" y2="426"
        stroke="#CC7820" stroke-width="20" stroke-linecap="round"/>
  <path d="M 86,86 A 170,170 0 0 1 86,426"
        fill="none" stroke="#CC7820" stroke-width="20" stroke-linecap="round"/>

  <!-- ── Middle D  (R=135, bar x=121, span y=121→391) ── -->
  <line x1="121" y1="121" x2="121" y2="391"
        stroke="#CC7820" stroke-width="20" stroke-linecap="round"/>
  <path d="M 121,121 A 135,135 0 0 1 121,391"
        fill="none" stroke="#CC7820" stroke-width="20" stroke-linecap="round"/>

  <!-- ── Inner D  (R=100, bar x=156, span y=156→356) ── -->
  <line x1="156" y1="156" x2="156" y2="356"
        stroke="#CC7820" stroke-width="20" stroke-linecap="round"/>
  <path d="M 156,156 A 100,100 0 0 1 156,356"
        fill="none" stroke="#CC7820" stroke-width="20" stroke-linecap="round"/>

  <!-- ── Sound wave — two arches flowing through D, exits right ── -->
  <path d="M 68,256
           C 110,162 185,355 258,256
           C 312,178 372,338 430,256
           C 455,224 468,234 496,222"
        fill="none" stroke="#CC7820" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
