<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#111E35"/>
      <stop offset="100%" stop-color="#060A14"/>
    </linearGradient>
  </defs>

  <!-- Full bleed — OS applies mask shape -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Design scaled to 78% and centered for Android maskable safe zone -->
  <g transform="translate(56,56) scale(0.78)">
    <path d="M 200,100 A 156,156 0 0 1 200,412"
          fill="none" stroke="#CAAA50" stroke-width="10"
          stroke-opacity="0.18" stroke-linecap="round"/>
    <path d="M 200,134 A 122,122 0 0 1 200,378"
          fill="none" stroke="#CAAA50" stroke-width="22"
          stroke-opacity="0.50" stroke-linecap="round"/>
    <path d="M 200,170 A 86,86 0 0 1 200,342"
          fill="none" stroke="#CAAA50" stroke-width="38"
          stroke-opacity="1.0" stroke-linecap="round"/>
    <rect x="144" y="100" width="52" height="312" rx="14" fill="#CAAA50"/>
    <rect x="208" y="238" width="52" height="36" rx="18"
          fill="white" opacity="0.88"/>
  </g>
</svg>
