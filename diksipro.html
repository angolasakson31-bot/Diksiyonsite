<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080b10">
<title>DiksiPro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #080b10;
  --s1:     #0f1520;
  --s2:     #16202e;
  --s3:     #1e2d40;
  --gold:   #c8a84b;
  --text:   #dce6f0;
  --sub:    #8fa3b8;
  --muted:  #4a5d72;
  --border: #1e2d40;
  --green:  #2e9e5e;
  --r:      14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100dvh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}

/* ── SETUP ── */
#scSetup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:40px 20px;text-align:center}
.brand-name{font-family:'Playfair Display',serif;font-size:56px;font-weight:700;letter-spacing:-2px;line-height:1}
.brand-name em{color:var(--gold);font-style:normal}
.brand-sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:8px;margin-bottom:52px}
.setup-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:30px 22px;width:100%;max-width:380px}
.setup-card h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px}
.setup-card p{font-size:13px;color:var(--sub);line-height:1.65;margin-bottom:26px}
.pills{display:flex;gap:8px;margin-bottom:28px}
.pill{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 6px;text-align:center}
.pill strong{display:block;font-size:22px;font-weight:700;color:var(--gold)}
.pill span{font-size:10px;color:var(--muted);margin-top:2px;display:block}
.btn-gold{width:100%;padding:16px;background:var(--gold);color:#000;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-gold:active{opacity:.8}

/* ── MAIN ── */
#scMain{display:none}

/* Header */
.hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:14px 18px 12px;position:sticky;top:0;z-index:100}
.hdr-r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hdr-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.hdr-logo em{color:var(--gold);font-style:normal}
.streak{display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:700;transition:all .3s}
.streak.hot{border-color:var(--gold);color:var(--gold)}
.hdr-r2{display:flex;align-items:center;justify-content:space-between}
.set-lbl{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.wdots{display:flex;gap:5px;align-items:center}
.wd{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .3s}
.wd.done{background:var(--green)}
.wd.now{background:var(--gold);width:10px;height:10px}

/* Nav */
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--s2);border-bottom:1px solid var(--border)}
.nav-btn{background:none;border:1px solid var(--border);color:var(--sub);border-radius:9px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.nav-btn:disabled{opacity:.2;cursor:default}
.nav-btn:not(:disabled):active{background:var(--s3)}
.nav-mid{text-align:center}
.nav-day{font-size:15px;font-weight:700}
.nav-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* Content */
.content{padding:16px 14px 120px;max-width:500px;margin:0 auto}

/* Block label */
.blabel{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.blabel::after{content:'';flex:1;height:1px;background:var(--border)}

/* Warmup */
.warm-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
.warm-vowels{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;letter-spacing:10px;color:var(--gold);margin-bottom:6px}
.warm-note{font-size:12px;color:var(--sub);line-height:1.55}

/* Ses grubu başlığı */
.ses-grp{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.ses-grp::after{content:'';flex:1;height:1px;background:var(--border)}

/* Tekerleme */
.tek{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:8px;position:relative;overflow:hidden}
.tek::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);opacity:.4;border-radius:3px 0 0 3px}
.tek-no{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.tek-text{font-family:'Playfair Display',serif;font-size:16px;line-height:1.75;color:var(--text);font-style:italic;margin-bottom:12px}
.tek-note{font-size:12px;color:var(--sub);border-top:1px solid var(--border);padding-top:10px;line-height:1.6}

.divider{height:1px;background:var(--border);margin:22px 0}

/* Okuma */
.read-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px 18px}
.read-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1.3;margin-bottom:4px}
.read-cat{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.read-body{font-size:15px;line-height:1.92;color:#b0c2d4}
.read-body p{margin-bottom:15px}
.read-body p:last-child{margin-bottom:0}
.read-tip{font-size:12px;color:var(--sub);border-top:1px solid var(--border);padding-top:12px;margin-top:16px;line-height:1.6}

/* Done banner */
.done-banner{background:rgba(46,158,94,.1);border:1px solid rgba(46,158,94,.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--green);font-weight:600;text-align:center}

/* Done bar */
.done-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 14px 24px;background:linear-gradient(transparent,var(--bg) 38%)}
.done-btn{display:block;width:100%;max-width:500px;margin:0 auto;padding:16px;border-radius:13px;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.done-btn.active{background:var(--gold);color:#000}
.done-btn.completed{background:var(--green);color:#fff}
.done-btn.past{background:var(--s2);color:var(--muted);border:1px solid var(--border);cursor:default}
.done-btn.future{background:var(--s2);color:var(--muted);border:1px solid var(--border);cursor:default}
</style>
</head>
<body>

<!-- SETUP -->
<div id="scSetup">
  <div class="brand-name">Diksi<em>Pro</em></div>
  <div class="brand-sub">Profesyonel Ses Eğitimi</div>
  <div class="setup-card">
    <h2>Hoş Geldin</h2>
    <p>9 haftalık profesyonel diksiyon programı. Her gün yaklaşık 10 dakika. İlerleme telefona kaydedilir.</p>
    <div class="pills">
      <div class="pill"><strong>9</strong><span>Hafta</span></div>
      <div class="pill"><strong>63</strong><span>Gün</span></div>
      <div class="pill"><strong>~10dk</strong><span>Günlük</span></div>
    </div>
    <button class="btn-gold" onclick="startProgram()">Programa Başla →</button>
  </div>
</div>

<!-- MAIN -->
<div id="scMain">
  <div class="hdr">
    <div class="hdr-r1">
      <div class="hdr-logo">Diksi<em>Pro</em></div>
      <div class="streak" id="streakBadge">🔥 <span id="streakN">0</span> gün</div>
    </div>
    <div class="hdr-r2">
      <div class="set-lbl" id="setLbl">Set A · 1. Hafta</div>
      <div class="wdots" id="wdots"></div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">← Önceki</button>
    <div class="nav-mid">
      <div class="nav-day" id="navDay">Gün 1</div>
      <div class="nav-sub" id="navSub">Bugün</div>
    </div>
    <button class="nav-btn" id="btnNext" onclick="navigate(1)">Sonraki →</button>
  </div>

  <div class="content" id="content"></div>

  <div class="done-bar">
    <button class="done-btn active" id="doneBtn" onclick="markDone()">✓ Bugünü Tamamladım</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// PROGRAM VERİSİ — 63 GÜN
// ════════════════════════════════════════════════
// Ses grubu döngüsü (7 günlük):
// G1: P-B-M | G2: T-D-N | G3: K-G-Ğ
// G4: S-Z-Ş-J | G5: Ç-C | G6: L-R | G7: F-V+Ünlüler

const SETS = ["A","A","A","B","B","B","C","C","C"]; // 9 hafta
const SES_GRUPLARI = [
  "P · B · M — Dudak Kasları",
  "T · D · N — Dil Ucu",
  "K · G · Ğ — Dil Kökü",
  "S · Z · Ş · J — Tiz Sesler",
  "Ç · C — Patlayıcı Sesler",
  "L · R — Akıcı Sesler",
  "F · V · Ünlüler — Dudak & Açıklık"
];

// Tekerlemeler: 3 set × 7 ses grubu × 3 tekerleme = 63 tekerleme
// İleride icerik.js dosyasından yüklenecek, şimdilik Set A tam, B-C placeholder
const TEKERLEMELER = {
  A: [
    // Gün 1 — P·B·M
    [
      {m:"Bir berber bir berbere gel beraber bir berber dükkanı açalım demiş, berber de berbere neden açalım ki demiş.",
       n:"▸ Her B'de dudaklar tam kapansın. İlk 2 turda yavaş ve net, 3. turda hızlan ama B sesi yutulmasın."},
      {m:"Pire pireyi arar, pireyi bulamayan pire pireden pire alır, alan da pirelenmiş.",
       n:"▸ P'de nefes patlamasını hisset — elini ağzının önüne tut, her P'de hava çarpsın. Nefes yoksa P doğru değil."},
      {m:"Büyük balıkçı balığa çıkmış, balık balıkçıya bakmış, bakışmışlar, balık baygın balığa dalmış.",
       n:"▸ B-L geçişini pürüzsüz tut. B patlasın, L akıcı olsun. Ritim kopmadan 5 kez tekrarla."}
    ],
    // Gün 2 — T·D·N
    [
      {m:"Deden dededen, dede de dededen, dedenin dedesi de dededen gelmiş, dededen dede.",
       n:"▸ D'yi dil ucuyla diş arkasına vur. Keskin ve kısa. Her D bir tokmak gibi — yumuşatma, netleştir."},
      {m:"Tandır tandırda tın tın tınlar, tandırın tını benim tandır tınımdır, tın tın tın.",
       n:"▸ T-N arasındaki farkı abartarak hisset. T sert patlasın, N titreşimli çıksın. Tempolu söyle."},
      {m:"Ninni ninniye ninnilerin ninnisi, ninnicinin ninnisi de ninni ninnisidir, ninni dinle.",
       n:"▸ N'yi titreşimli söyle. Burnuna değil, göğsüne çek. N boğumlanması öne, dil arkaya gitmesin."}
    ],
    // Gün 3 — K·G·Ğ
    [
      {m:"Karga karganın kargasına gak demiş, karganın kargası da ona gak gak demiş, kargalar gaklaşmış.",
       n:"▸ K'yı dil kökünden fırlat, G'yi yumuşat. K sert — G yumuşak. Bu zıtlığı bilerek abartarak söyle."},
      {m:"Köpek köpeğin köpeğine havladı, köpeğin köpeği de havladı, ikisi de birbirine havladı.",
       n:"▸ Ğ'yi yutma — hafifçe uzat, bir ses gibi muamele et. K-G-Ğ üçlüsü dil kökünde çalışıyor."},
      {m:"Güğüm güğümlerin güğümü, güğümlenen güğüm güğümlü güğümdür, güğüm güğümlenir.",
       n:"▸ G-Ğ geçişi dil kökünde hassas kontrol ister. Yavaş başla, her sesi ayrı ayrı hisset."}
    ],
    // Gün 4 — S·Z·Ş·J
    [
      {m:"Şu köşe yaz köşesi, bu köşe kış köşesi, şu köşe de yaz kış köşesidir, köşe köşedir.",
       n:"▸ Ş'yi dişlerin arkasında tut, sızırtı sesi dışarı çıksın. Her 'köşe'de kısa bir dur, ritmi koru."},
      {m:"Sosis sosisçide pişer, sosisçi sosise sos yapar, soslu sosis sosis sosisçide pişer.",
       n:"▸ S keskin ve tiz çıksın, Z'ye kaçırma. S-S-S ardarda gelince sibilant egzersizi yapıyorsun."},
      {m:"Jandarma janjanlı giyinmiş, janjanlı jandarma şanlı şanlı yürümüş, jan jan jan yürümüş.",

    ],
    // Gün 5 — Ç·C
    [
      {m:"Çok çalışan çalışkan çocuk çalışmayan çocuktan çok daha fazla çalışır, çalışkan çok çalışır.",
       n:"▸ Ç kısa ve keskin patlasın, uzatma. Her Ç'den hemen sonrakine geç, enerji kaybetme."},
      {m:"Cacıkçı cacık yapar, cacıkçının cacığı çok cacıklı bir cacıktır, cacıkçı cacıklamış.",
       n:"▸ C yumuşak — Ç sert. İkisi arasındaki farkı kasıtlı abartarak söyle. C-Ç-C-Ç diye tekrarla."},
      {m:"Çiçekçi çiçek satar, çiçekçinin çiçeği her mevsim çiçek çiçek açar, çiçekler açmış.",

    ],
    // Gün 6 — L·R
    [
      {m:"Sarı sarımsak sarı sarımsak, sarı sarımsağın sarısı sarıdır, sarı sarımsak sarıdır.",

      {m:"Limona liman, limanda limon, limonluk limanlık, limanlı limonluktur, limon limonluk.",
       n:"▸ L'yi dil ucu ile diş arkasına tam daya. Temiz, net çıksın. L havada kaybolmasın."},
      {m:"Rüzgâr rüzgârları savurur, savrulan rüzgâr rüzgârsız kalır, rüzgârsız yerde rüzgâr eser.",
       n:"▸ R-L geçişi spikerin sınavıdır. Hızlandıkça bu geçişe dikkat et. En az 5 kez tekrarla."}
    ],
    // Gün 7 — F·V + Ünlüler
    [
      {m:"Fıkırcı fıkra fırlatır, fırlatılan fıkra fıkırcıya fırlar, fıkırcı fıkra fırlamış.",

  // SET B ve C — sonraki konuşmalarda eklenecek
  B: Array(7).fill(null).map((_,i) => [
    {m:"[Set B içeriği yakında eklenecek — Set A ile devam et]", n:"▸ Şu an Set A tekerlemeleriyle çalışmaya devam edebilirsin."},
    {m:"[Set B içeriği yakında eklenecek — Set A ile devam et]", n:"▸ Şu an Set A tekerlemeleriyle çalışmaya devam edebilirsin."},
    {m:"[Set B içeriği yakında eklenecek — Set A ile devam et]", n:"▸ Şu an Set A tekerlemeleriyle çalışmaya devam edebilirsin."}
  ]),
  C: Array(7).fill(null).map((_,i) => [
    {m:"[Set C içeriği yakında eklenecek — Set A ile devam et]", n:"▸ Şu an Set A tekerlemeleriyle çalışmaya devam edebilirsin."},
    {m:"[Set C içeriği yakında eklenecek — Set A ile devam et]", n:"▸ Şu an Set A tekerlemeleriyle çalışmaya devam edebilirsin."},
    {m:"[Set C içeriği yakında eklenecek — Set A ile devam et]", n:"▸ Şu an Set A tekerlemeleriyle çalışmaya devam edebilirsin."}
  ])
};

// Okuma metinleri — 63 metin, şimdilik 3 tam, kalanlar placeholder
const METINLER = [
  // Gün 1
  {baslik:"Edison'un 10.000 Deneyi",kategori:"Tarih · Akıcılık",
   body:`<p>Thomas Edison, ampulü icat etmeden önce binlerce kez başarısız oldu. Bir gazeteci bunu yüzüne vurduğunda Edison şöyle yanıt verdi: "Başarısız olmadım. İşe yaramayan binlerce yöntemi keşfettim."</p>
<p>Bu bakış açısı her şeyi değiştirir. Başarısızlık bir son değildir, bir bilgidir. Her hata sana neyin işe yaramadığını gösterir. Neyin işe yaramadığını bilen biri ise doğru yola her geçen gün biraz daha yaklaşır.</p>
<p>Edison sadece ampulü değil, bir düşünce biçimini de icat etti. Sonuç odaklı değil, süreç odaklı düşünmek. Hedefe değil, öğrenmeye odaklanmak. Bu yüzden binlerce kez düşen adam, tarihin en büyük mucitlerinden biri olarak ayağa kalktı.</p>
<p>Peki ya sen? Kaçıncı denemede bırakıyorsun?</p>`,
   tip:"▸ Vurgu: 'binlerce kez', 'başarısız olmadım', 'ayağa kalktı'. Son soru yavaş ve net — dinleyiciye bırak."},

  // Gün 2
  {baslik:"Sessizliğin Gücü",kategori:"Psikoloji · Vurgu",
   body:`<p>Konuşmacılar arasında en güçlü araç kelimeler değildir. Sessizliktir. Bir cümle söyledin, sustun — ve o suskunluk seni dinleyene düşündürür, hissettirir, merak ettiriri.</p>
<p>Büyük spikerlerin ortak özelliği budur. Hızlı konuşmak değil, doğru yerde durmak. Bir nokta koyduktan sonra bir nefes almak. İzleyiciye düşünme fırsatı vermek.</p>
<p>Sessizlik zayıflık değildir. Aksine, sesi olan insanlar sustuktan sonra daha güçlü konuşurlar. Çünkü dinleyici o boşluğu doldurmak için sana odaklanır.</p>
<p>Bu metni okurken noktalarda tam dur. Virgüllerde nefes al. Sessizliği hisset.</p>`,
   tip:"▸ Noktalarda gerçekten dur — en az 1 saniye. 'Sessizliktir' kelimesinden sonra uzun bir nefes al."},

  // Gün 3
  {baslik:"Nikola Tesla'nın Kayıp Sırrı",kategori:"Bilim · Ritim",
   body:`<p>Nikola Tesla, 1899 yılında Colorado'daki laboratuvarında oturmuş düşünüyordu. Elinde kâğıt yoktu. Kalem de yoktu. Ama zihninde dünyanın en karmaşık elektrik sistemini çiziyordu — tam olarak, hatasız, çalışır halde.</p>
<p>Tesla, büyük fikirlerini hiç kâğıda dökmeden önce zihninde tamamlardı. Yıllar süren bu içsel çalışma onun en büyük silahıydı. Çünkü bir fikri kafanızda tutabilmek için onu gerçekten anlamanız gerekir.</p>
<p>Bugün her şeyi dışarıya yazıyoruz. Telefona, ekrana, kâğıda. Belki de bu yüzden bir şeyleri gerçekten anlayamıyoruz — sadece saklıyoruz.</p>
<p>Tesla'nın sırrı belki de şuydu: Düşünmek için zaman ayırmak.</p>`,
   tip:"▸ 'Tam olarak, hatasız, çalışır halde' — her kelime ayrı, ağır. 'Sadece saklıyoruz' vurgulu biter."},

  // Gün 4–63 — placeholder (sonraki konuşmalarda eklenecek)
  ...Array(60).fill(null).map((_, i) => ({
    baslik: `Gün ${i+4} — İçerik Yakında`,
    kategori: "İçerik ekleniyor",
    body: `<p>Bu günün okuma metni henüz eklenmedi. Bir önceki günün metnini tekrar okuyabilirsin — aynı metni farklı hızda okumak da çok faydalı bir egzersizdir.</p>
<p>Yavaş ve abartılı → Normal hızda → Hızlı ama net. Bu üç turla herhangi bir metni tam bir egzersize dönüştürebilirsin.</p>`,
    tip: "▸ Bir önceki günün metniyle çalışmaya devam et."
  }))
];

// ════════════════════════════════════════════════
// UYGULAMA MANTIĞI
// ════════════════════════════════════════════════

let state = {
  started: false,
  startDay: null,     // program başlangıç tarihi (timestamp, gece 00:00)
  currentView: 0,     // şu an görüntülenen gün indeksi (0-62)
  completed: []       // tamamlanan gün indeksleri
};

function loadState() {
  const s = localStorage.getItem("diksipro_v1");
  if (s) state = JSON.parse(s);
}
function saveState() {
  localStorage.setItem("diksipro_v1", JSON.stringify(state));
}

function todayIndex() {
  if (!state.startDay) return 0;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const diff = Math.floor((today - state.startDay) / 86400000);
  return Math.max(0, Math.min(62, diff));
}

function startProgram() {
  const now = new Date();
  state.startDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  state.started = true;
  state.currentView = 0;
  state.completed = [];
  saveState();
  showMain();
}

function showMain() {
  document.getElementById("scSetup").style.display = "none";
  document.getElementById("scMain").style.display = "block";
  renderDay(state.currentView);
}

function navigate(dir) {
  const ti = todayIndex();
  const next = state.currentView + dir;
  if (next < 0 || next > ti) return; // ileriye geçemez (sadece bugüne kadar)
  state.currentView = next;
  renderDay(state.currentView);
}

function markDone() {
  const ti = todayIndex();
  if (state.currentView !== ti) return;
  if (!state.completed.includes(ti)) {
    state.completed.push(ti);
    saveState();
  }
  renderDay(ti);
}

function getDayMeta(idx) {
  // idx: 0-62
  const weekIdx = Math.floor(idx / 7);       // 0-8
  const dayInWeek = idx % 7;                  // 0-6
  const set = SETS[weekIdx];                  // A/B/C
  const setWeek = (weekIdx % 3) + 1;          // 1-3
  const sesGrp = SES_GRUPLARI[dayInWeek];

  // Tekerleme setini bul (Set A haftası 0-2, B 3-5, C 6-8)
  const setKey = set;
  const teks = TEKERLEMELER[setKey][dayInWeek];

  return { weekIdx, dayInWeek, set, setWeek, sesGrp, teks };
}

function renderDay(idx) {
  const ti = todayIndex();
  const meta = getDayMeta(idx);
  const metin = METINLER[idx];
  const isDone = state.completed.includes(idx);
  const isToday = idx === ti;
  const isFuture = idx > ti;

  // Header
  document.getElementById("setLbl").textContent = `Set ${meta.set} · ${meta.setWeek}. Hafta`;

  // Streak
  let streak = 0;
  for (let i = ti; i >= 0; i--) {
    if (state.completed.includes(i)) streak++;
    else break;
  }
  document.getElementById("streakN").textContent = streak;
  const sb = document.getElementById("streakBadge");
  sb.className = "streak" + (streak > 0 ? " hot" : "");

  // Week dots (son 7 gün)
  const dotsEl = document.getElementById("wdots");
  dotsEl.innerHTML = "";
  const weekStart = Math.floor(ti / 7) * 7;
  for (let d = weekStart; d < weekStart + 7 && d <= 62; d++) {
    const wd = document.createElement("div");
    wd.className = "wd" + (state.completed.includes(d) ? " done" : "") + (d === ti ? " now" : "");
    dotsEl.appendChild(wd);
  }

  // Nav
  document.getElementById("navDay").textContent = `Gün ${idx + 1}`;
  document.getElementById("navSub").textContent =
    isToday ? "Bugün" : isFuture ? "Henüz gelmedi" : `${ti - idx} gün önce`;
  document.getElementById("btnPrev").disabled = idx === 0;
  document.getElementById("btnNext").disabled = idx >= ti;

  // Done button
  const btn = document.getElementById("doneBtn");
  if (isFuture) {
    btn.className = "done-btn future"; btn.textContent = "Bu gün henüz gelmedi";
  } else if (isDone) {
    btn.className = "done-btn completed"; btn.textContent = "✓ Tamamlandı";
  } else if (isToday) {
    btn.className = "done-btn active"; btn.textContent = "✓ Bugünü Tamamladım";
  } else {
    btn.className = "done-btn past"; btn.textContent = "Geçmiş gün";
  }

  // Content
  const c = document.getElementById("content");
  c.innerHTML = "";

  // Tamamlandı banner
  if (isDone) {
    c.innerHTML += `<div class="done-banner">✓ Bu günü tamamladın 🎉</div>`;
  }

  // Isınma
  c.innerHTML += `
    <div class="warm-card">
      <div class="blabel">Isınma</div>
      <div class="warm-vowels">A · E · I · O · U</div>
      <div class="warm-note">Her ünlüde çeneni maksimum aç — abartarak söyle. 3 tur yap, her turda biraz daha hızlan. Burun sesini ağza çek.</div>
    </div>`;

  // Ses grubu
  c.innerHTML += `<div class="ses-grp">${meta.sesGrp}</div>`;

  // Tekerlemeler
  meta.teks.forEach((t, i) => {
    c.innerHTML += `
      <div class="tek">
        <div class="tek-no">Tekerleme ${i+1}</div>
        <div class="tek-text">${t.m}</div>
        <div class="tek-note">${t.n}</div>
      </div>`;
  });

  // Divider
  c.innerHTML += `<div class="divider"></div>`;

  // Okuma
  c.innerHTML += `
    <div class="read-card">
      <div class="blabel">Sesli Okuma</div>
      <div class="read-title">${metin.baslik}</div>
      <div class="read-cat">${metin.kategori}</div>
      <div class="read-body">${metin.body}</div>
      <div class="read-tip">${metin.tip}</div>
    </div>`;
}

// Init
loadState();
if (state.started) {
  state.currentView = todayIndex();
  showMain();
}
</script>
</body>
</html>
