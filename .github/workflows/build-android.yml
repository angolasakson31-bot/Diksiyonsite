name: Build Android APK

on:
  push:
    branches:
      - claude/google-play-app-adaptation-ur3NY
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platforms
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;26.1.10909125" --sdk_root=$ANDROID_SDK_ROOT

      - name: Install dependencies
        working-directory: DiksiProApp
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild (Android native proje oluştur)
        working-directory: DiksiProApp
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_DOTENV: 1

      - name: Patch Android project (kotlinVersion + newArch fix)
        working-directory: DiksiProApp/android
        run: |
          echo "=== build.gradle ==="
          cat build.gradle

          echo "=== gradle.properties ==="
          cat gradle.properties

          # expo-modules-gradle-plugin kotlinVersion gerektirir
          if ! grep -q "kotlinVersion" build.gradle; then
            echo "PATCH: kotlinVersion eksik, ekleniyor..."
            sed -i 's/buildToolsVersion/kotlinVersion = "2.0.21"\n        buildToolsVersion/' build.gradle
            echo "--- PATCHED build.gradle ---"
            cat build.gradle
          fi

          # New Architecture devre disi birakildi (uyumluluk icin)
          if ! grep -q "newArchEnabled" gradle.properties; then
            echo "newArchEnabled=false" >> gradle.properties
          fi

          echo "=== FINAL gradle.properties ==="
          cat gradle.properties

      - name: Build APK
        working-directory: DiksiProApp/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: APK'yı artifact olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: DiksiPro-v${{ github.run_number }}
          path: DiksiProApp/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: GitHub Release olustur ve APK ekle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: preview-v${{ github.run_number }}
          name: "DiksiPro Preview v${{ github.run_number }}"
          body: |
            ## DiksiPro Android APK — Test Surumu

            ### Telefona Kurulum
            1. Asagidaki `app-debug.apk` dosyasina dokun → Indir
            2. Telefon ayarlari → Guvenlik → **Bilinmeyen kaynaklara izin ver**
            3. Indirilen APK'ya dokun → Yukle → Ac
          files: DiksiProApp/android/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
