name: Build Android APK

on:
  push:
    branches:
      - claude/google-play-app-adaptation-ur3NY
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: DiksiProApp
        run: npm install

      - name: Expo Prebuild (Android native proje oluştur)
        working-directory: DiksiProApp
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: DiksiProApp/android
        run: ./gradlew assembleDebug --no-daemon

      - name: APK'yı artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: DiksiPro-v${{ github.run_number }}
          path: DiksiProApp/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: GitHub Release oluştur ve APK ekle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: preview-v${{ github.run_number }}
          name: "DiksiPro Preview v${{ github.run_number }}"
          body: |
            ## DiksiPro Android APK — Test Sürümü

            ### Telefona Kurulum
            1. Aşağıdaki `app-debug.apk` dosyasına dokun → İndir
            2. Telefon ayarları → Güvenlik → **Bilinmeyen kaynaklara izin ver**
            3. İndirilen APK'ya dokun → Yükle → Aç
          files: DiksiProApp/android/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
