      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" \
            > ~/.bubblewrap/config.json

      - name: Generate Android project
        run: bubblewrap update --skipPwaValidation

      - name: Build APK / AAB
        env:
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      - name: Find built files
        id: find_apk
        run: |
          APK=$(find . -name "*.apk" | head -1)
          AAB=$(find . -name "*.aab" | head -1)
          echo "apk=$APK" >> $GITHUB_OUTPUT
          echo "aab=$AAB" >> $GITHUB_OUTPUT
          echo "APK: $APK"
          echo "AAB: $AAB"

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DiksiPro v1.0.${{ github.run_number }}"
          body: |
            ## DiksiPro Android Uygulamasi

            **APK** dosyasini indirip Android telefonuna yukle.

            Yukleme: Ayarlar > Guvenlik > Bilinmeyen kaynaklara izin ver
          files: |
            ${{ steps.find_apk.outputs.apk }}
            ${{ steps.find_apk.outputs.aab }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts (yedek)
        uses: actions/upload-artifact@v4
        with:
          name: DiksiPro-APK-v${{ github.run_number }}
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
