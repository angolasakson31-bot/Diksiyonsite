name: Build DiksiPro for Google Play

on:
  workflow_dispatch:
    inputs:
      first_run:
        description: 'İlk çalıştırma mı? (keystore oluşturur) — true veya false'
        required: false
        default: 'false'

env:
  KEYSTORE_FILE: diksipro.keystore
  KEYSTORE_ALIAS: diksipro

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install librsvg & Bubblewrap
        run: |
          sudo apt-get install -y librsvg2-bin
          npm install -g @bubblewrap/cli@latest

      - name: Generate PNG icons from SVG
        run: |
          rsvg-convert -w 192 -h 192 icons/icon.svg -o icons/icon-192.png
          rsvg-convert -w 512 -h 512 icons/icon.svg -o icons/icon-512.png
          rsvg-convert -w 512 -h 512 icons/icon-maskable.svg -o icons/icon-maskable-512.png
          echo "Icons generated successfully."

      # ── İLK ÇALIŞTIRMA: yeni keystore üret ──────────────────────────────
      - name: Generate new keystore (first run only)
        if: github.event.inputs.first_run == 'true'
        id: gen_ks
        run: |
          PASSWORD="DiksiPro$(date +%Y)Ses!"
          keytool -genkeypair \
            -alias "$KEYSTORE_ALIAS" \
            -keypass "$PASSWORD" \
            -keystore "$KEYSTORE_FILE" \
            -storepass "$PASSWORD" \
            -dname "CN=DiksiPro, O=DiksiPro, C=TR" \
            -validity 10000 \
            -keyalg RSA -keysize 2048
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Print keystore info for GitHub Secrets (first run)
        if: github.event.inputs.first_run == 'true'
        env:
          KS_PASS: ${{ steps.gen_ks.outputs.password }}
        run: |
          echo "========================================================"
          echo "ADIM 1 — Bu değeri kopyalayıp KEYSTORE_BASE64 secret'ına ekle:"
          echo "--------------------------------------------------------"
          base64 "$KEYSTORE_FILE"
          echo ""
          echo "========================================================"
          echo "ADIM 2 — Bu şifreyi KEYSTORE_PASSWORD secret'ına ekle:"
          echo "$KS_PASS"
          echo ""
          echo "========================================================"
          echo "ADIM 3 — assetlinks.json için SHA256 fingerprint:"
          keytool -list -v \
            -keystore "$KEYSTORE_FILE" \
            -alias "$KEYSTORE_ALIAS" \
            -storepass "$KS_PASS" | grep "SHA256:"
          echo "========================================================"

      - name: Upload keystore artifact (first run — SAKLA!)
        if: github.event.inputs.first_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: KEYSTORE-SAKLA-BUNU
          path: ${{ env.KEYSTORE_FILE }}
          retention-days: 3

      # ── NORMAL ÇALIŞTIRMA: mevcut keystore'u geri yükle ─────────────────
      - name: Restore keystore from secret
        if: github.event.inputs.first_run != 'true'
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "HATA: KEYSTORE_BASE64 secret'ı bulunamadı!"
            echo "Önce first_run=true ile çalıştır ve secret'ları ekle."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$KEYSTORE_FILE"
          echo "Keystore geri yüklendi."

      # ── Keystore şifresini belirle ───────────────────────────────────────
      - name: Resolve keystore password
        id: ks_pwd
        env:
          FROM_SECRET: ${{ secrets.KEYSTORE_PASSWORD }}
          FROM_STEP: ${{ steps.gen_ks.outputs.password }}
        run: |
          if [ -n "$FROM_SECRET" ]; then
            echo "password=$FROM_SECRET" >> "$GITHUB_OUTPUT"
          else
            echo "password=$FROM_STEP" >> "$GITHUB_OUTPUT"
          fi

      # ── Bubblewrap yapılandır ve derle ───────────────────────────────────
      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" \
            > ~/.bubblewrap/config.json

      - name: Generate Android project (bubblewrap update)
        run: bubblewrap update --skipPwaValidation

      - name: Build APK / AAB
        env:
          KEYSTORE_PASSWORD: ${{ steps.ks_pwd.outputs.password }}
          KEY_PASSWORD: ${{ steps.ks_pwd.outputs.password }}
        run: bubblewrap build --skipPwaValidation

      # ── Çıktıları yükle ─────────────────────────────────────────────────
      - name: Upload APK & AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DiksiPro-GooglePlay-v${{ github.run_number }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Build summary
        run: |
          echo "## DiksiPro Build Tamamlandı!" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "APK ve AAB dosyaları **Artifacts** bölümünde." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Google Play Console:** AAB dosyasını yükle (APK değil)." >> "$GITHUB_STEP_SUMMARY"
