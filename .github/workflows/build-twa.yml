name: Build DiksiPro APK

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-twa.yml'
      - 'twa-manifest.json'
      - 'manifest.json'
      - 'icons/**'
  workflow_dispatch:

env:
  KEYSTORE_FILE: diksipro.keystore
  KEYSTORE_ALIAS: diksipro
  KEYSTORE_PASSWORD: "DiksiPro2025Ses!"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install librsvg & Bubblewrap
        run: |
          sudo apt-get install -y librsvg2-bin
          npm install -g @bubblewrap/cli@latest

      - name: Generate PNG icons from SVG
        run: |
          rsvg-convert -w 192 -h 192 icons/icon.svg -o icons/icon-192.png
          rsvg-convert -w 512 -h 512 icons/icon.svg -o icons/icon-512.png
          rsvg-convert -w 512 -h 512 icons/icon-maskable.svg -o icons/icon-maskable-512.png

