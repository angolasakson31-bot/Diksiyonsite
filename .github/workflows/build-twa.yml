      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" > android/local.properties

      - name: Build signed APK
        working-directory: android
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/$KEYSTORE_FILE" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEYSTORE_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEYSTORE_PASSWORD"

      - name: Find built APK
        id: find_apk
        run: |
          APK=$(find android -name "*.apk" | grep release | head -1)
          echo "apk=$APK" >> $GITHUB_OUTPUT
          echo "APK: $APK"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DiksiPro v1.0.${{ github.run_number }}"
          body: |
            ## DiksiPro Android Uygulaması

            **APK** dosyasını indirip Android telefonuna yükle.

            Yükleme: Ayarlar > Güvenlik > Bilinmeyen kaynaklara izin ver
          files: ${{ steps.find_apk.outputs.apk }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiksiPro-APK-v${{ github.run_number }}
          path: android/**/*.apk
          retention-days: 30
