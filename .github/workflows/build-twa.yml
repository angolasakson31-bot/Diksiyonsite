name: Build DiksiPro APK

on:
  push:
    branches: [main, claude/google-play-app-setup-PP9Jk]
    paths:
      - '.github/workflows/build-twa.yml'
      - 'android/**'
      - 'icons/**'
  workflow_dispatch:

env:
  KEYSTORE_FILE: diksipro.keystore
  KEYSTORE_ALIAS: diksipro
  KEYSTORE_PASSWORD: "DiksiPro2025Ses!"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$(pwd)/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Install librsvg
        run: sudo apt-get install -y librsvg2-bin

      - name: Generate mipmap icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          rsvg-convert -w 48  -h 48  icons/icon.svg          -o android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          rsvg-convert -w 72  -h 72  icons/icon.svg          -o android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          rsvg-convert -w 96  -h 96  icons/icon.svg          -o android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          rsvg-convert -w 144 -h 144 icons/icon.svg          -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          rsvg-convert -w 192 -h 192 icons/icon.svg          -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          rsvg-convert -w 48  -h 48  icons/icon-maskable.svg -o android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          rsvg-convert -w 72  -h 72  icons/icon-maskable.svg -o android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          rsvg-convert -w 96  -h 96  icons/icon-maskable.svg -o android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          rsvg-convert -w 144 -h 144 icons/icon-maskable.svg -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          rsvg-convert -w 192 -h 192 icons/icon-maskable.svg -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

